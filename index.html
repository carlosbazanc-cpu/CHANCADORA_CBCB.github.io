/* ============================================================
   MÓDULO: ANALÍTICA DE DESPACHOS  (solo rol administrativo)
   Todo el análisis se calcula sobre el arreglo existente DISPATCHES.
   ============================================================ */

/* Colores por estado (reutiliza la identidad visual) */
const ESTADO_COLOR = { pendiente:'#9AA0A8', en_carga:'#D79A24', en_validacion:'#3E7AC0',
                       autorizado:'#2E9E6B', salido:'#6A5DC4', bloqueado:'#D6453F' };
const MATERIAL_COLOR = { 'Piedra chancada':'#E8772E', 'Piedra media':'#D79A24', 'Arena gruesa':'#3E7AC0' };

/* Estado de los filtros globales del módulo */
const ANALYTICS = { periodo:'mes', desde:'', hasta:'', cliente:'', material:'', estado:'',
                    placa:'', incidencia:'todos', sortKey:'fecha', sortDir:'desc' };

/* ---------- Helpers de fecha ---------- */
function startOfDay(d){ const x=new Date(d); x.setHours(0,0,0,0); return x; }
function endOfDay(d){ const x=new Date(d); x.setHours(23,59,59,999); return x; }
function capitaliza(s){ return s.charAt(0).toUpperCase()+s.slice(1); }
function fmtTon(n){ return (n==null||isNaN(n))?'—':n.toLocaleString('es-PE',{minimumFractionDigits:1,maximumFractionDigits:1})+' t'; }
function fmtFechaLarga(d){ return d.toLocaleDateString('es-PE',{day:'2-digit',month:'long',year:'numeric'}); }

/* ---------- Incidencias ---------- */
function tuvoBloqueoHist(d){ return d.estado==='bloqueado' || d.historial.some(h=>/bloqueo/i.test(h.etapa)); }
function sinIncidencias(d){ return !d.requirioAjuste && !tuvoBloqueoHist(d); }
function tiempoAtencion(d){ return (d.salidaAt && d.createdAt) ? Math.round((d.salidaAt-d.createdAt)/60000) : null; }

/* ---------- Resolución del periodo ---------- */
function rangoPeriodo(){
  const now=new Date(); const p=ANALYTICS.periodo;
  let start,end,label;
  if(p==='hoy'){ start=startOfDay(now); end=endOfDay(now); label='Hoy, '+fmtFechaLarga(now); }
  else if(p==='semana'){
    const dow=(now.getDay()+6)%7; const mon=new Date(now); mon.setDate(now.getDate()-dow);
    start=startOfDay(mon); const sun=new Date(mon); sun.setDate(mon.getDate()+6); end=endOfDay(sun);
    label='Semana del '+start.toLocaleDateString('es-PE',{day:'2-digit',month:'short'})+' al '+end.toLocaleDateString('es-PE',{day:'2-digit',month:'short',year:'numeric'});
  }
  else if(p==='anio'){ start=startOfDay(new Date(now.getFullYear(),0,1)); end=endOfDay(new Date(now.getFullYear(),11,31)); label='Año '+now.getFullYear(); }
  else if(p==='rango'){
    const a=ANALYTICS.desde?new Date(ANALYTICS.desde+'T00:00:00'):null;
    const b=ANALYTICS.hasta?new Date(ANALYTICS.hasta+'T23:59:59'):null;
    if(a&&b&&!isNaN(a)&&!isNaN(b)&&a<=b){ start=startOfDay(a); end=endOfDay(b);
      label='Del '+a.toLocaleDateString('es-PE',{day:'2-digit',month:'short',year:'numeric'})+' al '+b.toLocaleDateString('es-PE',{day:'2-digit',month:'short',year:'numeric'}); }
    else { start=startOfDay(new Date(now.getFullYear(),now.getMonth(),1)); end=endOfDay(new Date(now.getFullYear(),now.getMonth()+1,0)); label='Rango incompleto — mostrando mes actual'; }
  }
  else { start=startOfDay(new Date(now.getFullYear(),now.getMonth(),1)); end=endOfDay(new Date(now.getFullYear(),now.getMonth()+1,0)); label=capitaliza(now.toLocaleDateString('es-PE',{month:'long',year:'numeric'})); }
  const dias=Math.max(1, Math.ceil((end-start)/86400000));
  return {start,end,label,dias};
}
function modoAgrupacion(dias){ return dias<=1?'hora':(dias<=31?'dia':'mes'); }

/* ---------- Filtro combinado ---------- */
function filtrarAnalitica(){
  const r=rangoPeriodo();
  return DISPATCHES.filter(d=>{
    if(!(d.createdAt>=r.start && d.createdAt<=r.end)) return false;
    if(ANALYTICS.cliente && d.cliente!==ANALYTICS.cliente) return false;
    if(ANALYTICS.material && d.material!==ANALYTICS.material) return false;
    if(ANALYTICS.estado && d.estado!==ANALYTICS.estado) return false;
    if(ANALYTICS.placa && d.placa!==ANALYTICS.placa) return false;
    const inc=ANALYTICS.incidencia;
    if(inc==='sin' && !sinIncidencias(d)) return false;
    if(inc==='ajuste' && !d.requirioAjuste) return false;
    if(inc==='bloqueo' && !tuvoBloqueoHist(d)) return false;
    return true;
  });
}

/* ---------- Cálculo de indicadores ---------- */
function kpisAnalitica(list){
  const total=list.length;
  const m3=list.reduce((s,d)=>s+d.cantidadM3,0);
  const conPeso=list.filter(d=>d.tara!=null&&d.pesoFinal!=null);
  const tonReal=conPeso.reduce((s,d)=>s+pesoReal(d),0)/1000;
  const salidos=list.filter(d=>d.estado==='salido');
  const pctCompl= total? (salidos.length/total*100) : null;
  const ajuste=list.filter(d=>d.requirioAjuste).length;
  const bloq=list.filter(d=>d.estado==='bloqueado').length;
  const conTiempo=list.filter(d=>d.estado==='salido'&&d.salidaAt&&d.createdAt);
  const tProm= conTiempo.length? conTiempo.reduce((s,d)=>s+(d.salidaAt-d.createdAt)/60000,0)/conTiempo.length : null;
  return {total,m3,tonReal:conPeso.length?tonReal:null,pctCompl,ajuste,bloq,tProm};
}

/* ---------- Agrupación temporal para la evolución ---------- */
function agruparEvolucion(list,r){
  const modo=modoAgrupacion(r.dias);
  const buckets=[];
  if(modo==='hora'){
    const hrs=list.map(d=>d.createdAt.getHours());
    let min=hrs.length?Math.min(...hrs):8, max=hrs.length?Math.max(...hrs):16;
    min=Math.min(min,7); max=Math.max(max,16);
    for(let h=min;h<=max;h++) buckets.push({key:'h'+h,label:String(h).padStart(2,'0')+':00',count:0,ton:0});
  } else if(modo==='dia'){
    let cur=startOfDay(r.start); const end=new Date(r.end);
    while(cur<=end && buckets.length<40){ buckets.push({key:cur.getFullYear()+'-'+cur.getMonth()+'-'+cur.getDate(), label:cur.toLocaleDateString('es-PE',{day:'2-digit',month:'short'}),count:0,ton:0}); cur=new Date(cur); cur.setDate(cur.getDate()+1); }
  } else {
    let cur=new Date(r.start.getFullYear(),r.start.getMonth(),1); const end=new Date(r.end.getFullYear(),r.end.getMonth(),1);
    while(cur<=end && buckets.length<24){ buckets.push({key:cur.getFullYear()+'-'+cur.getMonth(), label:capitaliza(cur.toLocaleDateString('es-PE',{month:'short'})),count:0,ton:0}); cur=new Date(cur); cur.setMonth(cur.getMonth()+1); }
  }
  const idx=new Map(buckets.map((b,i)=>[b.key,i]));
  function keyDe(dt){ if(modo==='hora')return 'h'+dt.getHours(); if(modo==='dia')return dt.getFullYear()+'-'+dt.getMonth()+'-'+dt.getDate(); return dt.getFullYear()+'-'+dt.getMonth(); }
  list.forEach(d=>{ const i=idx.get(keyDe(d.createdAt)); if(i!=null){ buckets[i].count++; if(d.tara!=null&&d.pesoFinal!=null) buckets[i].ton+=pesoReal(d)/1000; } });
  return {modo,buckets};
}

/* ============================================================
   GRÁFICOS EN SVG (sin dependencias externas)
   ============================================================ */
function niceMax(v){ v=Math.max(v,0); if(v===0)return 1; const exp=Math.pow(10,Math.floor(Math.log10(v))); const f=v/exp; let nf; if(f<=1)nf=1;else if(f<=2)nf=2;else if(f<=2.5)nf=2.5;else if(f<=5)nf=5;else nf=10; return nf*exp; }
function chartCard(title,sub,inner,legend,full){ return '<div class="card chart-card'+(full?' chart-full':'')+'"><h4>'+title+'</h4><div class="csub">'+sub+'</div>'+inner+(legend?('<div class="chart-legend">'+legend+'</div>'):'')+'</div>'; }
function legItem(color,txt){ return '<span class="li"><span class="sw" style="background:'+color+'"></span>'+txt+'</span>'; }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* 1) Evolución: barras (cantidad) + línea (toneladas reales), doble eje */
function chartEvolucion(list,r){
  const ev=agruparEvolucion(list,r); const b=ev.buckets;
  if(!b.length) return chartCard('Evolución de los despachos','Sin datos en el periodo','<div class="chart-empty">Sin registros.</div>',null,true);
  const W=760,H=300,L=48,R=52,T=18,B=54, pw=W-L-R, ph=H-T-B;
  const maxC=niceMax(Math.max(1,...b.map(x=>x.count)));
  const maxT=niceMax(Math.max(0.1,...b.map(x=>x.ton)));
  const n=b.length, bw=Math.min(46, pw/n*0.55);
  const xc=i=>L+pw*(i+0.5)/n;
  const yC=v=>T+ph-ph*v/maxC, yT=v=>T+ph-ph*v/maxT;
  let g='';
  // grid + eje Y izquierdo (cantidad) y derecho (toneladas)
  for(let i=0;i<=4;i++){ const yy=T+ph*i/4; const vc=maxC*(4-i)/4, vt=maxT*(4-i)/4;
    g+='<line class="ggrid" x1="'+L+'" y1="'+yy+'" x2="'+(W-R)+'" y2="'+yy+'"/>';
    g+='<text class="gtxt" x="'+(L-8)+'" y="'+(yy+3)+'" text-anchor="end">'+Math.round(vc)+'</text>';
    g+='<text class="gtxt" x="'+(W-R+8)+'" y="'+(yy+3)+'" text-anchor="start" fill="#3E7AC0">'+vt.toFixed(1)+'</text>';
  }
  // barras cantidad
  b.forEach((x,i)=>{ const h=ph-(yC(x.count)-T); const bx=xc(i)-bw/2;
    g+='<rect data-tip="'+esc(x.label)+'<br><b>'+x.count+'</b> despachos · <b>'+x.ton.toFixed(1)+' t</b>" x="'+bx+'" y="'+yC(x.count)+'" width="'+bw+'" height="'+Math.max(0,h)+'" rx="3" fill="#E8772E" opacity="0.9"/>';
  });
  // línea toneladas
  let pts=b.map((x,i)=>xc(i)+','+yT(x.ton)).join(' ');
  g+='<polyline points="'+pts+'" fill="none" stroke="#3E7AC0" stroke-width="2.5"/>';
  b.forEach((x,i)=>{ g+='<circle data-tip="'+esc(x.label)+'<br><b>'+x.ton.toFixed(1)+' t</b> reales · '+x.count+' desp." cx="'+xc(i)+'" cy="'+yT(x.ton)+'" r="3.5" fill="#fff" stroke="#3E7AC0" stroke-width="2"/>'; });
  // etiquetas X
  const step=n>16?2:1;
  b.forEach((x,i)=>{ if(i%step) return; const rot=n>10?(' transform="rotate(-32 '+xc(i)+' '+(T+ph+14)+')"'):'';
    g+='<text class="gtxt" x="'+xc(i)+'" y="'+(T+ph+16)+'" text-anchor="'+(n>10?'end':'middle')+'"'+rot+'>'+esc(x.label)+'</text>'; });
  g+='<line class="gaxis" x1="'+L+'" y1="'+(T+ph)+'" x2="'+(W-R)+'" y2="'+(T+ph)+'"/>';
  const svg='<svg class="chart-svg" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet">'+g+'</svg>';
  const legend=legItem('#E8772E','Despachos (barras)')+legItem('#3E7AC0','Toneladas reales (línea)');
  return chartCard('Evolución de los despachos','Agrupado por '+({hora:'hora',dia:'día',mes:'mes'}[ev.modo]),svg,legend,true);
}

/* Dona genérica (usa técnica stroke-dasharray) */
function donutSVG(segs,total,centerV,centerS){
  const W=230,cx=115,cy=110,r=74,sw=26,C=2*Math.PI*r; let acc=0,g='';
  if(total<=0) return '<div class="chart-empty">Sin registros.</div>';
  segs.forEach(s=>{ if(s.value<=0)return; const len=C*s.value/total; const pct=(s.value/total*100);
    g+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+s.color+'" stroke-width="'+sw+'" stroke-dasharray="'+len+' '+(C-len)+'" stroke-dashoffset="'+(-acc)+'" transform="rotate(-90 '+cx+' '+cy+')" data-tip="'+esc(s.label)+'<br><b>'+s.value+'</b> ('+pct.toFixed(1)+'%)"/>';
    acc+=len; });
  g+='<text class="gtxt dark" x="'+cx+'" y="'+(cy-2)+'" text-anchor="middle" style="font-size:22px">'+centerV+'</text>';
  g+='<text class="gtxt" x="'+cx+'" y="'+(cy+16)+'" text-anchor="middle">'+centerS+'</text>';
  return '<svg class="chart-svg" viewBox="0 0 '+W+' 220" preserveAspectRatio="xMidYMid meet" style="max-height:240px">'+g+'</svg>';
}

/* 2) Distribución por estado (dona) */
function chartEstado(list){
  const segs=Object.keys(ESTADO_LABEL).map(k=>({label:ESTADO_LABEL[k],value:list.filter(d=>d.estado===k).length,color:ESTADO_COLOR[k]}));
  const total=list.length;
  const inner=donutSVG(segs,total,total,'despachos');
  const legend=segs.filter(s=>s.value>0).map(s=>legItem(s.color,s.label+' ('+s.value+')')).join('');
  return chartCard('Distribución por estado','Cantidad y porcentaje de registros',inner,legend);
}

/* 3) Volumen por material (barras verticales) */
function chartMaterial(list){
  const mats=Object.keys(MATERIALES).map(m=>{ const reg=list.filter(d=>d.material===m); const m3=reg.reduce((s,d)=>s+d.cantidadM3,0);
    const ton=reg.filter(d=>d.tara!=null&&d.pesoFinal!=null).reduce((s,d)=>s+pesoReal(d)/1000,0); return {m,m3,ton,count:reg.length}; });
  const total=mats.reduce((s,x)=>s+x.m3,0);
  if(total<=0) return chartCard('Volumen por material','m³ despachados por tipo','<div class="chart-empty">Sin registros.</div>');
  const W=760,H=250,L=40,R=16,T=16,B=42,pw=W-L-R,ph=H-T-B;
  const maxV=niceMax(Math.max(1,...mats.map(x=>x.m3))); const n=mats.length, bw=Math.min(120,pw/n*0.5);
  const xc=i=>L+pw*(i+0.5)/n, y=v=>T+ph-ph*v/maxV; let g='';
  for(let i=0;i<=4;i++){ const yy=T+ph*i/4; g+='<line class="ggrid" x1="'+L+'" y1="'+yy+'" x2="'+(W-R)+'" y2="'+yy+'"/>'; g+='<text class="gtxt" x="'+(L-8)+'" y="'+(yy+3)+'" text-anchor="end">'+Math.round(maxV*(4-i)/4)+'</text>'; }
  mats.forEach((x,i)=>{ const h=ph-(y(x.m3)-T);
    g+='<rect data-tip="'+esc(x.m)+'<br><b>'+fmtNum(x.m3)+' m³</b> · '+x.ton.toFixed(1)+' t · '+x.count+' desp." x="'+(xc(i)-bw/2)+'" y="'+y(x.m3)+'" width="'+bw+'" height="'+Math.max(0,h)+'" rx="4" fill="'+MATERIAL_COLOR[x.m]+'"/>';
    g+='<text class="gtxt dark" x="'+xc(i)+'" y="'+(y(x.m3)-6)+'" text-anchor="middle">'+fmtNum(x.m3)+'</text>';
    g+='<text class="gtxt" x="'+xc(i)+'" y="'+(T+ph+16)+'" text-anchor="middle">'+esc(x.m)+'</text>';
  });
  g+='<line class="gaxis" x1="'+L+'" y1="'+(T+ph)+'" x2="'+(W-R)+'" y2="'+(T+ph)+'"/>';
  const svg='<svg class="chart-svg" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet">'+g+'</svg>';
  const legend=mats.map(x=>legItem(MATERIAL_COLOR[x.m],x.m)).join('');
  return chartCard('Volumen por material','m³ solicitados por tipo de agregado',svg,legend);
}

/* 4) Principales clientes (barras horizontales, top 5 por volumen) */
function chartClientes(list){
  const map={}; list.forEach(d=>{ if(!map[d.cliente])map[d.cliente]={m3:0,count:0}; map[d.cliente].m3+=d.cantidadM3; map[d.cliente].count++; });
  const arr=Object.keys(map).map(k=>({cliente:k,m3:map[k].m3,count:map[k].count})).sort((a,b)=>b.m3-a.m3).slice(0,5);
  if(!arr.length) return chartCard('Principales clientes','Top 5 por volumen','<div class="chart-empty">Sin registros.</div>');
  const W=760,rowH=38,L=8,R=60,T=6,pw=W-L-R, H=T*2+arr.length*rowH;
  const maxV=Math.max(1,...arr.map(x=>x.m3)); let g='';
  arr.forEach((x,i)=>{ const y=T+i*rowH; const bw=pw*x.m3/maxV;
    g+='<text class="gtxt dark" x="'+L+'" y="'+(y+11)+'">'+esc(x.cliente.length>34?x.cliente.slice(0,33)+'…':x.cliente)+'</text>';
    g+='<rect x="'+L+'" y="'+(y+15)+'" width="'+pw+'" height="14" rx="7" fill="#EFEDE7"/>';
    g+='<rect data-tip="'+esc(x.cliente)+'<br><b>'+fmtNum(x.m3)+' m³</b> · '+x.count+' despachos" x="'+L+'" y="'+(y+15)+'" width="'+Math.max(4,bw)+'" height="14" rx="7" fill="#6A5DC4"/>';
    g+='<text class="gtxt dark" x="'+(W-R+6)+'" y="'+(y+26)+'">'+fmtNum(x.m3)+' m³</text>';
  });
  const svg='<svg class="chart-svg" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet">'+g+'</svg>';
  return chartCard('Principales clientes','Top 5 por volumen despachado (m³ y N° de despachos)',svg);
}

/* 5) Control de diferencias de peso (tira con banda de tolerancia) */
function chartDiferencias(list){
  const q=list.filter(d=>d.tara!=null&&d.pesoFinal!=null);
  if(!q.length) return chartCard('Control de diferencias de peso','Peso vendido vs. peso real','<div class="chart-empty">Sin pesajes registrados en la selección.</div>');
  const W=760,H=210,L=36,R=20,T=34,B=42,pw=W-L-R,ph=H-T-B;
  let maxAbs=Math.max(TOL+2, ...q.map(d=>Math.abs(difPct(d)))); const D=Math.ceil(maxAbs*1.05);
  const x=p=>L+pw*(p+D)/(2*D); const yLim=Math.min(TOL*1.6,D); let g='';
  // bandas: roja (fondo), amarilla, verde
  g+='<rect x="'+L+'" y="'+T+'" width="'+pw+'" height="'+ph+'" fill="#FBE9E7"/>';
  g+='<rect x="'+x(-yLim)+'" y="'+T+'" width="'+(x(yLim)-x(-yLim))+'" height="'+ph+'" fill="#FBF1D6"/>';
  g+='<rect x="'+x(-TOL)+'" y="'+T+'" width="'+(x(TOL)-x(-TOL))+'" height="'+ph+'" fill="#E2F3EA"/>';
  // línea central 0
  g+='<line x1="'+x(0)+'" y1="'+T+'" x2="'+x(0)+'" y2="'+(T+ph)+'" stroke="#9AA0A8" stroke-dasharray="4 3"/>';
  // referencia de tolerancia
  g+='<line x1="'+x(-TOL)+'" y1="'+T+'" x2="'+x(-TOL)+'" y2="'+(T+ph)+'" stroke="#2E9E6B" stroke-width="1.5"/>';
  g+='<line x1="'+x(TOL)+'" y1="'+T+'" x2="'+x(TOL)+'" y2="'+(T+ph)+'" stroke="#2E9E6B" stroke-width="1.5"/>';
  g+='<text class="gtxt" x="'+x(TOL)+'" y="'+(T-8)+'" text-anchor="middle" fill="#1E7048">Tolerancia ±'+TOL+'%</text>';
  // puntos
  q.forEach((d,i)=>{ const p=difPct(d); const ap=Math.abs(p); const col= ap<=TOL?'#2E9E6B':(ap<=TOL*1.6?'#D79A24':'#D6453F');
    const cy=T+ph*(((i%9)+1)/11);
    g+='<circle data-tip="'+esc(d.codigo)+'<br>'+esc(d.cliente)+'<br><b>'+fmtPct(p)+'</b> ('+fmtKg(pesoReal(d))+')" cx="'+x(Math.max(-D,Math.min(D,p)))+'" cy="'+cy+'" r="5" fill="'+col+'" fill-opacity="0.85" stroke="#fff" stroke-width="1"/>'; });
  // eje X
  for(let t=-D;t<=D;t+=Math.max(1,Math.round(D/4))){ g+='<text class="gtxt" x="'+x(t)+'" y="'+(T+ph+16)+'" text-anchor="middle">'+(t>0?'+':'')+t+'%</text>'; }
  const svg='<svg class="chart-svg" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet">'+g+'</svg>';
  const legend=legItem('#2E9E6B','Dentro de tolerancia')+legItem('#D79A24','Cerca del límite')+legItem('#D6453F','Fuera de tolerancia');
  return chartCard('Control de diferencias de peso','Diferencia % entre peso vendido y peso real',svg,legend,true);
}

/* 6) Incidencias del proceso (barras verticales) */
function chartIncidencias(list){
  const cats=[
    {l:'Sin incidencias',v:list.filter(sinIncidencias).length,c:'#2E9E6B'},
    {l:'Con ajuste',v:list.filter(d=>d.requirioAjuste).length,c:'#D79A24'},
    {l:'Con bloqueo registrado',v:list.filter(tuvoBloqueoHist).length,c:'#6A5DC4'},
    {l:'Bloqueados ahora',v:list.filter(d=>d.estado==='bloqueado').length,c:'#D6453F'}
  ];
  const W=760,H=250,L=40,R=16,T=16,B=52,pw=W-L-R,ph=H-T-B;
  const maxV=niceMax(Math.max(1,...cats.map(x=>x.v))); const n=cats.length, bw=Math.min(100,pw/n*0.5);
  const xc=i=>L+pw*(i+0.5)/n, y=v=>T+ph-ph*v/maxV; let g='';
  for(let i=0;i<=4;i++){ const yy=T+ph*i/4; g+='<line class="ggrid" x1="'+L+'" y1="'+yy+'" x2="'+(W-R)+'" y2="'+yy+'"/>'; g+='<text class="gtxt" x="'+(L-8)+'" y="'+(yy+3)+'" text-anchor="end">'+Math.round(maxV*(4-i)/4)+'</text>'; }
  cats.forEach((x,i)=>{ const h=ph-(y(x.v)-T);
    g+='<rect data-tip="'+esc(x.l)+'<br><b>'+x.v+'</b> despachos" x="'+(xc(i)-bw/2)+'" y="'+y(x.v)+'" width="'+bw+'" height="'+Math.max(0,h)+'" rx="4" fill="'+x.c+'"/>';
    g+='<text class="gtxt dark" x="'+xc(i)+'" y="'+(y(x.v)-6)+'" text-anchor="middle">'+x.v+'</text>';
    const words=x.l.split(' ');
    g+='<text class="gtxt" x="'+xc(i)+'" y="'+(T+ph+16)+'" text-anchor="middle">'+esc(words.slice(0,2).join(' '))+'</text>';
    if(words.length>2) g+='<text class="gtxt" x="'+xc(i)+'" y="'+(T+ph+29)+'" text-anchor="middle">'+esc(words.slice(2).join(' '))+'</text>';
  });
  g+='<line class="gaxis" x1="'+L+'" y1="'+(T+ph)+'" x2="'+(W-R)+'" y2="'+(T+ph)+'"/>';
  const svg='<svg class="chart-svg" viewBox="0 0 '+W+' '+H+'" preserveAspectRatio="xMidYMid meet">'+g+'</svg>';
  return chartCard('Incidencias del proceso','Comparativo de calidad de los despachos',svg);
}

/* ---------- Ordenamiento de la tabla ---------- */
function ordenarAnalitica(list){
  const k=ANALYTICS.sortKey, dir=ANALYTICS.sortDir==='asc'?1:-1;
  const val=d=>{ if(k==='fecha')return d.createdAt.getTime(); if(k==='cliente')return d.cliente.toLowerCase();
    if(k==='material')return d.material.toLowerCase(); if(k==='volumen')return d.cantidadM3; if(k==='estado')return d.estado; return d.createdAt.getTime(); };
  return [...list].sort((a,b)=>{ const va=val(a),vb=val(b); return va<vb?-dir:(va>vb?dir:0); });
}
function arrowFor(k){ if(ANALYTICS.sortKey!==k) return '<span class="arr">↕</span>'; return '<span class="arr">'+(ANALYTICS.sortDir==='asc'?'▲':'▼')+'</span>'; }

/* ---------- Selects de filtros ---------- */
function distinct(arr){ return [...new Set(arr)]; }
function opt(v,cur,txt){ return '<option value="'+esc(v)+'"'+(v===cur?' selected':'')+'>'+esc(txt||v)+'</option>'; }

/* ============================================================

function agruparPorDia(list){
  const map={}; list.forEach(d=>{ const key=startOfDay(d.createdAt).getTime(); (map[key]=map[key]||[]).push(d); });
  return Object.keys(map).map(Number).sort((a,b)=>a-b).map(key=>{ const reg=map[key]; const k=kpisAnalitica(reg);
    return {fecha:new Date(key), reg, ...k}; });
}
function agruparPorMes(list){
  const map={}; list.forEach(d=>{ const key=d.createdAt.getFullYear()+'-'+d.createdAt.getMonth(); (map[key]=map[key]||[]).push(d); });
  return Object.keys(map).sort().map(key=>{ const reg=map[key]; const k=kpisAnalitica(reg); const bl=reg.filter(tuvoBloqueoHist).length; const aj=reg.filter(d=>d.requirioAjuste).length;
    return {label:capitaliza(reg[0].createdAt.toLocaleDateString('es-PE',{month:'long',year:'numeric'})), reg, ...k, bl, aj}; });
}
function filtrosActivosTexto(){
  const A=ANALYTICS, out=[];
  if(A.cliente) out.push('Cliente: '+A.cliente);
  if(A.material) out.push('Material: '+A.material);
  if(A.estado) out.push('Estado: '+ESTADO_LABEL[A.estado]);
  if(A.placa) out.push('Placa: '+A.placa);
  if(A.incidencia && A.incidencia!=='todos') out.push('Incidencia: '+({sin:'Sin incidencias',ajuste:'Con ajuste',bloqueo:'Con bloqueo'}[A.incidencia]));
  return out.length? out.join(' · ') : 'Ninguno (todos los registros)';
}

    // A) Reporte detallado por despacho
    const filas=ordenarAnalitica(list).map(d=>{ const pr=pesoReal(d), dk=difKg(d), dp=difPct(d), t=tiempoAtencion(d);
      const inc = d.requirioAjuste?('Ajuste ×'+(d.ajustes||1)) : (tuvoBloqueoHist(d)?'Bloqueo':'—');
      return `<tr><td>${d.codigo}</td><td>${fmtHora(d.createdAt)}</td><td>${d.salidaAt?fmtHora(d.salidaAt):'—'}</td>
        <td>${d.cliente}</td><td>${d.placa}</td><td>${d.material}</td><td style="text-align:right">${d.cantidadM3}</td>
        <td style="text-align:right">${fmtNum(pesoVendido(d))}</td><td style="text-align:right">${d.tara!=null?fmtNum(d.tara):'—'}</td>
        <td style="text-align:right">${d.pesoFinal!=null?fmtNum(d.pesoFinal):'—'}</td><td style="text-align:right">${pr==null?'—':fmtNum(pr)}</td>
        <td style="text-align:right">${dk==null?'—':fmtNum(dk)}</td><td style="text-align:right">${dp==null?'—':fmtPct(dp)}</td>
        <td style="text-align:center">${d.ajustes||0}</td><td>${ESTADO_LABEL[d.estado]}</td><td style="text-align:right">${t==null?'—':t+'m'}</td><td>${inc}</td></tr>`;}).join('');
    cuerpo=`<h2>Resumen del día</h2>${repKpis(k)}
      <div class="rep-charts">${chartEvolucion(list,r)}${chartEstado(list)}</div>
      <h2>Detalle de despachos</h2>
      <table><thead><tr><th>Código</th><th>Reg.</th><th>Salida</th><th>Cliente</th><th>Placa</th><th>Material</th><th>m³</th><th>P.vend</th><th>Tara</th><th>P.final</th><th>P.real</th><th>Dif kg</th><th>Dif %</th><th>Aj.</th><th>Estado</th><th>T.</th><th>Incidencia</th></tr></thead><tbody>${filas}</tbody></table>
      ${seccionIncidencias(list)}`;
  } else if(dias<=31){
    // B) Reporte resumido por día
    const porDia=agruparPorDia(list);
    const filDia=porDia.map(x=>`<tr><td>${x.fecha.toLocaleDateString('es-PE',{weekday:'short',day:'2-digit',month:'short'})}</td>
      <td style="text-align:right">${x.total}</td><td style="text-align:right">${fmtNum(x.m3)}</td><td style="text-align:right">${x.tonReal==null?'—':fmtNum(x.tonReal)+' t'}</td>
      <td style="text-align:right">${x.reg.filter(d=>d.estado==='salido').length}</td><td style="text-align:right">${x.bloq}</td><td style="text-align:right">${x.ajuste}</td></tr>`).join('');
    const compact=ordenarAnalitica(list).map(d=>`<tr><td>${fmtFechaHora(d.createdAt)}</td><td>${d.codigo}</td><td>${d.cliente}</td><td>${d.material}</td><td style="text-align:right">${d.cantidadM3}</td><td style="text-align:right">${pesoReal(d)==null?'—':fmtNum(pesoReal(d))}</td><td>${ESTADO_LABEL[d.estado]}</td></tr>`).join('');
    cuerpo=`<h2>Indicadores del periodo</h2>${repKpis(k)}
      <div class="rep-charts">${chartEvolucion(list,r)}${chartMaterial(list)}</div>
      <h2>Resultados por día</h2>
      <table><thead><tr><th>Día</th><th>Despachos</th><th>m³</th><th>Ton reales</th><th>Salidos</th><th>Bloqueos</th><th>Ajustes</th></tr></thead><tbody>${filDia}</tbody></table>
      <h2>Detalle compacto</h2>
      <table><thead><tr><th>Fecha</th><th>Código</th><th>Cliente</th><th>Material</th><th>m³</th><th>P.real</th><th>Estado</th></tr></thead><tbody>${compact}</tbody></table>
      ${seccionIncidencias(list)}`;
  } else {
    // C) Reporte ejecutivo por mes
    const porMes=agruparPorMes(list);
    const filMes=porMes.map(x=>`<tr><td>${x.label}</td><td style="text-align:right">${x.total}</td><td style="text-align:right">${fmtNum(x.m3)}</td>
      <td style="text-align:right">${x.tonReal==null?'—':fmtNum(x.tonReal)+' t'}</td>
      <td style="text-align:right">${x.total?Math.round(x.bl/x.total*100):0}%</td><td style="text-align:right">${x.total?Math.round(x.aj/x.total*100):0}%</td>
      <td style="text-align:right">${x.tProm==null?'—':Math.round(x.tProm)+' min'}</td></tr>`).join('');
    // clientes top
    const mapC={}; list.forEach(d=>{ if(!mapC[d.cliente])mapC[d.cliente]={m3:0,c:0}; mapC[d.cliente].m3+=d.cantidadM3; mapC[d.cliente].c++; });
    const topC=Object.keys(mapC).map(k2=>({cliente:k2,...mapC[k2]})).sort((a,b)=>b.m3-a.m3).slice(0,5)
      .map(x=>`<tr><td>${x.cliente}</td><td style="text-align:right">${fmtNum(x.m3)}</td><td style="text-align:right">${x.c}</td></tr>`).join('');
    const mats=Object.keys(MATERIALES).map(m=>{ const reg=list.filter(d=>d.material===m); return `<tr><td>${m}</td><td style="text-align:right">${fmtNum(reg.reduce((s,d)=>s+d.cantidadM3,0))}</td><td style="text-align:right">${reg.length}</td></tr>`; }).join('');
    cuerpo=`<h2>Indicadores acumulados</h2>${repKpis(k)}
      <div class="rep-charts">${chartEvolucion(list,r)}${chartClientes(list)}</div>
      <h2>Comparación mensual</h2>
      <table><thead><tr><th>Mes</th><th>Despachos</th><th>m³</th><th>Ton reales</th><th>% bloqueos</th><th>% ajustes</th><th>T. prom.</th></tr></thead><tbody>${filMes}</tbody></table>
      <h2>Materiales despachados</h2>
      <table><thead><tr><th>Material</th><th>m³</th><th>Despachos</th></tr></thead><tbody>${mats}</tbody></table>
      <h2>Principales clientes</h2>
      <table><thead><tr><th>Cliente</th><th>m³</th><th>Despachos</th></tr></thead><tbody>${topC}</tbody></table>
      ${seccionIncidencias(list,true)}`;
  }

  const foot=`<div class="rep-foot"><div>${list.length} registro${list.length===1?'':'s'} · Emitido ${fmtFechaLarga(now)} ${fmtHora(now)}</div><div>Revisado por: ____________________</div></div>`;
  return `<div class="rep">${header}${cuerpo}${foot}</div>`;
}
function seccionIncidencias(list, soloResumen){
  const aj=list.filter(d=>d.requirioAjuste), bl=list.filter(tuvoBloqueoHist), blNow=list.filter(d=>d.estado==='bloqueado');
  let s=`<h2>Incidencias</h2><div class="rep-note">Sin incidencias: <b>${list.filter(sinIncidencias).length}</b> · Con ajuste: <b>${aj.length}</b> · Con bloqueo registrado: <b>${bl.length}</b> · Bloqueados actualmente: <b>${blNow.length}</b></div>`;
  if(!soloResumen && (aj.length||bl.length)){
    const filas=[...new Set([...aj,...bl])].map(d=>`<tr><td>${d.codigo}</td><td>${d.cliente}</td><td>${d.material}</td><td>${d.requirioAjuste?('Ajuste ×'+(d.ajustes||1)):''}${(d.requirioAjuste&&tuvoBloqueoHist(d))?' + ':''}${tuvoBloqueoHist(d)?'Bloqueo':''}</td><td>${ESTADO_LABEL[d.estado]}</td></tr>`).join('');
    s+=`<table><thead><tr><th>Código</th><th>Cliente</th><th>Material</th><th>Incidencia</th><th>Estado</th></tr></thead><tbody>${filas}</tbody></table>`;
  }
  return s;
}
function setPrintOrientation(orient){
  const st=document.getElementById('print-page');
  if(st) st.textContent='@page{ size:A4 '+orient+'; margin:12mm }';
}
function exportarReportePDF(){
  if(ROLE!=='administrativo'){ toast('Solo el personal administrativo exporta reportes','bad'); return; }
  const r=rangoPeriodo(); const list=filtrarAnalitica();
  setPrintOrientation(r.dias<=31?'landscape':'portrait');
  document.getElementById('print-area').innerHTML=construirReporte(r,list,r.dias);
  setTimeout(()=>window.print(), 60);
}

/* ============================================================
   INTERACCIONES DEL MÓDULO (filtros, orden, export, tooltips)
   ============================================================ */
document.addEventListener('change', e=>{
  const el=e.target.closest('[data-af]'); if(!el) return;
  const key=el.dataset.af; ANALYTICS[key]=el.value;
  if(key==='periodo' && el.value!=='rango'){ ANALYTICS.desde=''; ANALYTICS.hasta=''; }
  render();
});
document.addEventListener('click', e=>{
  const s=e.target.closest('[data-asort]');
  if(s){ const k=s.dataset.asort; if(ANALYTICS.sortKey===k) ANALYTICS.sortDir=ANALYTICS.sortDir==='asc'?'desc':'asc'; else { ANALYTICS.sortKey=k; ANALYTICS.sortDir=k==='fecha'?'desc':'asc'; } render(); return; }
  if(e.target.closest('[data-aclear]')){ Object.assign(ANALYTICS,{periodo:'mes',desde:'',hasta:'',cliente:'',material:'',estado:'',placa:'',incidencia:'todos'}); render(); return; }
  if(e.target.closest('[data-aexport]')){ exportarReportePDF(); return; }
});
/* Tooltip flotante para los gráficos (delegado una sola vez) */
(function(){
  const tip=document.getElementById('chartTip');
  document.addEventListener('mouseover', e=>{ const el=e.target.closest('[data-tip]'); if(el && tip){ tip.innerHTML=el.getAttribute('data-tip'); tip.style.opacity='1'; } });
  document.addEventListener('mousemove', e=>{ if(tip && tip.style.opacity==='1'){ let x=e.clientX+14, y=e.clientY+14; if(x+250>window.innerWidth)x=e.clientX-250; tip.style.left=x+'px'; tip.style.top=y+'px'; } });
  document.addEventListener('mouseout', e=>{ const el=e.target.closest('[data-tip]'); if(el && tip){ tip.style.opacity='0'; } });
})();


render();
setRole('administrativo');
</script>
