<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<script>
/* ===== Generador de QR autocontenido (sin dependencias externas) ===== */
/* Implementación de código QR (modo byte, niveles L/M/Q/H, versiones 1-9). */
window.QRGen=(function(){
  var MODE_8BIT=4, ECL={L:1,M:0,Q:3,H:2};
  var EXP=new Array(256), LOG=new Array(256);
  (function(){ for(var i=0;i<8;i++)EXP[i]=1<<i;
    for(var i=8;i<256;i++)EXP[i]=EXP[i-4]^EXP[i-5]^EXP[i-6]^EXP[i-8];
    for(var i=0;i<255;i++)LOG[EXP[i]]=i; })();
  function gexp(n){ while(n<0)n+=255; while(n>=255)n-=255; return EXP[n]; }
  function Poly(num,shift){ var off=0; while(off<num.length&&num[off]==0)off++;
    this.num=new Array(num.length-off+shift);
    for(var i=0;i<num.length-off;i++)this.num[i]=num[i+off]; }
  Poly.prototype.get=function(i){return this.num[i];};
  Poly.prototype.len=function(){return this.num.length;};
  Poly.prototype.multiply=function(e){ var num=new Array(this.len()+e.len()-1);
    for(var i=0;i<num.length;i++)num[i]=0;
    for(var i=0;i<this.len();i++)for(var j=0;j<e.len();j++)
      num[i+j]^=gexp(LOG[this.get(i)]+LOG[e.get(j)]);
    return new Poly(num,0); };
  Poly.prototype.mod=function(e){ if(this.len()-e.len()<0)return this;
    var ratio=LOG[this.get(0)]-LOG[e.get(0)]; var num=this.num.slice();
    for(var i=0;i<e.len();i++)num[i]^=gexp(LOG[e.get(i)]+ratio);
    return new Poly(num,0).mod(e); };
  function ecPoly(ec){ var a=new Poly([1],0);
    for(var i=0;i<ec;i++)a=a.multiply(new Poly([1,gexp(i)],0)); return a; }
  var RS=[
    [1,26,19],[1,26,16],[1,26,13],[1,26,9],
    [1,44,34],[1,44,28],[1,44,22],[1,44,16],
    [1,70,55],[1,70,44],[2,35,17],[2,35,13],
    [1,100,80],[2,50,32],[2,50,24],[4,25,9],
    [1,134,108],[2,67,43],[2,33,15,2,34,16],[2,33,11,2,34,12],
    [2,86,68],[4,43,27],[4,43,19],[4,43,15],
    [2,98,78],[4,49,31],[2,32,14,4,33,15],[4,39,13,1,40,14],
    [2,121,97],[2,60,38,2,61,39],[4,40,18,2,41,19],[4,40,14,2,41,15],
    [2,146,116],[3,58,36,2,59,37],[4,36,16,4,37,17],[4,36,12,4,37,13]
  ];
  var POS=[[],[6,18],[6,22],[6,26],[6,30],[6,34],[6,22,38],[6,24,42],[6,26,46]];
  function rsBlocks(ver,ecl){ var off={1:0,0:1,3:2,2:3}[ecl], row=RS[(ver-1)*4+off], b=[];
    for(var i=0;i<row.length;i+=3){ var cnt=row[i],tot=row[i+1],dat=row[i+2];
      for(var j=0;j<cnt;j++)b.push({total:tot,data:dat}); } return b; }
  function totalData(ver,ecl){ var b=rsBlocks(ver,ecl),t=0; for(var i=0;i<b.length;i++)t+=b[i].data; return t; }
  function chooseVer(len,ecl){ var req=4+8+8*len; for(var v=1;v<=9;v++)if(totalData(v,ecl)*8>=req)return v; return 9; }
  function BitBuf(){ this.buffer=[]; this.length=0; }
  BitBuf.prototype.putBit=function(bit){ var b=Math.floor(this.length/8);
    if(this.buffer.length<=b)this.buffer.push(0);
    if(bit)this.buffer[b]|=(0x80>>>(this.length%8)); this.length++; };
  BitBuf.prototype.put=function(num,len){ for(var i=0;i<len;i++)this.putBit(((num>>>(len-i-1))&1)==1); };
  function createData(ver,ecl,bytes){
    var blocks=rsBlocks(ver,ecl), buf=new BitBuf();
    buf.put(MODE_8BIT,4); buf.put(bytes.length,8);
    for(var i=0;i<bytes.length;i++)buf.put(bytes[i],8);
    var totBits=totalData(ver,ecl)*8;
    if(buf.length+4<=totBits)buf.put(0,4);
    while(buf.length%8!=0)buf.putBit(false);
    while(buf.length<totBits){ buf.put(0xEC,8); if(buf.length>=totBits)break; buf.put(0x11,8); }
    var maxDc=0,maxEc=0,dcd=[],ecd=[],offset=0;
    for(var r=0;r<blocks.length;r++){
      var dc=blocks[r].data, ec=blocks[r].total-dc;
      maxDc=Math.max(maxDc,dc); maxEc=Math.max(maxEc,ec);
      var dcArr=new Array(dc);
      for(var i=0;i<dc;i++)dcArr[i]=0xff&buf.buffer[i+offset];
      offset+=dc;
      var rsP=ecPoly(ec), raw=new Poly(dcArr,rsP.len()-1), modP=raw.mod(rsP);
      var ecArr=new Array(rsP.len()-1);
      for(var i=0;i<ecArr.length;i++){ var mi=i+modP.len()-ecArr.length; ecArr[i]=mi>=0?modP.get(mi):0; }
      dcd.push(dcArr); ecd.push(ecArr);
    }
    var tot=0; for(var r=0;r<blocks.length;r++)tot+=blocks[r].total;
    var data=new Array(tot), idx=0;
    for(var i=0;i<maxDc;i++)for(var r=0;r<blocks.length;r++)if(i<dcd[r].length)data[idx++]=dcd[r][i];
    for(var i=0;i<maxEc;i++)for(var r=0;r<blocks.length;r++)if(i<ecd[r].length)data[idx++]=ecd[r][i];
    return data;
  }
  var G15=0x537,G18=0x1f25,G15M=0x5412;
  function bchDigit(d){ var n=0; while(d!=0){n++; d>>>=1;} return n; }
  function bchInfo(d){ var x=d<<10; while(bchDigit(x)-bchDigit(G15)>=0)x^=(G15<<(bchDigit(x)-bchDigit(G15))); return ((d<<10)|x)^G15M; }
  function bchVer(d){ var x=d<<12; while(bchDigit(x)-bchDigit(G18)>=0)x^=(G18<<(bchDigit(x)-bchDigit(G18))); return (d<<12)|x; }
  function mask(p,i,j){ switch(p){
    case 0:return (i+j)%2==0; case 1:return i%2==0; case 2:return j%3==0;
    case 3:return (i+j)%3==0; case 4:return (Math.floor(i/2)+Math.floor(j/3))%2==0;
    case 5:return (i*j)%2+(i*j)%3==0; case 6:return ((i*j)%2+(i*j)%3)%2==0;
    case 7:return ((i*j)%3+(i+j)%2)%2==0;} return false; }
  function makeMatrix(ver,ecl,data){
    var size=ver*4+17;
    function blank(){ var m=[]; for(var r=0;r<size;r++){m[r]=[]; for(var c=0;c<size;c++)m[r][c]=null;} return m; }
    function finder(m){ var pos=[[0,0],[size-7,0],[0,size-7]];
      for(var p=0;p<3;p++){ var rr=pos[p][0],cc=pos[p][1];
        for(var r=-1;r<=7;r++)for(var c=-1;c<=7;c++){ var R=rr+r,C=cc+c;
          if(R<0||R>=size||C<0||C>=size)continue;
          m[R][C]=(0<=r&&r<=6&&(c==0||c==6))||(0<=c&&c<=6&&(r==0||r==6))||(2<=r&&r<=4&&2<=c&&c<=4);
        } } }
    function timing(m){ for(var i=8;i<size-8;i++){ if(m[i][6]==null)m[i][6]=(i%2==0); if(m[6][i]==null)m[6][i]=(i%2==0); } }
    function align(m){ var pos=POS[ver-1];
      for(var i=0;i<pos.length;i++)for(var j=0;j<pos.length;j++){ var row=pos[i],col=pos[j];
        if(m[row][col]!=null)continue;
        for(var r=-2;r<=2;r++)for(var c=-2;c<=2;c++)m[row+r][col+c]=(r==-2||r==2||c==-2||c==2||(r==0&&c==0)); } }
    function verInfo(m){ if(ver<7)return; var bits=bchVer(ver);
      for(var i=0;i<18;i++){ var mod=((bits>>i)&1)==1;
        m[Math.floor(i/3)][i%3+size-8-3]=mod; m[i%3+size-8-3][Math.floor(i/3)]=mod; } }
    function typeInfo(m,p){ var bits=bchInfo((ecl<<3)|p);
      for(var i=0;i<15;i++){ var mod=((bits>>i)&1)==1;
        if(i<6)m[i][8]=mod; else if(i<8)m[i+1][8]=mod; else m[size-15+i][8]=mod; }
      for(var i=0;i<15;i++){ var mod=((bits>>i)&1)==1;
        if(i<8)m[8][size-i-1]=mod; else if(i<9)m[8][15-i-1+1]=mod; else m[8][15-i-1]=mod; }
      m[size-8][8]=true; }
    function mapData(m,p){ var inc=-1,row=size-1,bi=7,by=0;
      for(var col=size-1;col>0;col-=2){ if(col==6)col--;
        while(true){ for(var c=0;c<2;c++){ if(m[row][col-c]==null){
            var dark=false; if(by<data.length)dark=(((data[by]>>>bi)&1)==1);
            if(mask(p,row,col-c))dark=!dark; m[row][col-c]=dark;
            bi--; if(bi==-1){by++; bi=7;} } }
          row+=inc; if(row<0||size<=row){ row-=inc; inc=-inc; break; } } } }
    function lost(m){ var n=size,L=0;
      for(var r=0;r<n;r++)for(var c=0;c<n;c++){ var s=0,d=m[r][c];
        for(var rr=-1;rr<=1;rr++){ if(r+rr<0||n<=r+rr)continue;
          for(var cc=-1;cc<=1;cc++){ if(c+cc<0||n<=c+cc||(rr==0&&cc==0))continue; if(d==m[r+rr][c+cc])s++; } }
        if(s>5)L+=(3+s-5); }
      for(var r=0;r<n-1;r++)for(var c=0;c<n-1;c++){ var k=0; if(m[r][c])k++; if(m[r+1][c])k++; if(m[r][c+1])k++; if(m[r+1][c+1])k++; if(k==0||k==4)L+=3; }
      for(var r=0;r<n;r++)for(var c=0;c<n-6;c++){ if(m[r][c]&&!m[r][c+1]&&m[r][c+2]&&m[r][c+3]&&m[r][c+4]&&!m[r][c+5]&&m[r][c+6])L+=40; }
      for(var c=0;c<n;c++)for(var r=0;r<n-6;r++){ if(m[r][c]&&!m[r+1][c]&&m[r+2][c]&&m[r+3][c]&&m[r+4][c]&&!m[r+5][c]&&m[r+6][c])L+=40; }
      var dk=0; for(var r=0;r<n;r++)for(var c=0;c<n;c++)if(m[r][c])dk++;
      L+=Math.abs(100*dk/n/n-50)/5*10; return L; }
    var best=null,bl=0;
    for(var p=0;p<8;p++){ var m=blank(); finder(m); align(m); timing(m); verInfo(m); typeInfo(m,p); mapData(m,p);
      var lp=lost(m); if(best==null||lp<bl){bl=lp; best=m;} }
    return {size:size,modules:best};
  }
  function utf8(str){ var o=[]; for(var i=0;i<str.length;i++){ var c=str.charCodeAt(i);
    if(c<0x80)o.push(c);
    else if(c<0x800)o.push(0xc0|(c>>6),0x80|(c&0x3f));
    else if(c<0xd800||c>=0xe000)o.push(0xe0|(c>>12),0x80|((c>>6)&0x3f),0x80|(c&0x3f));
    else { i++; var cc=0x10000+(((c&0x3ff)<<10)|(str.charCodeAt(i)&0x3ff));
      o.push(0xf0|(cc>>18),0x80|((cc>>12)&0x3f),0x80|((cc>>6)&0x3f),0x80|(cc&0x3f)); } } return o; }
  return { generate:function(text,ecName){ var ecl=ECL[ecName||'M'];
    var bytes=utf8(String(text).slice(0,110)); var ver=chooseVer(bytes.length,ecl);
    return makeMatrix(ver,ecl,createData(ver,ecl,bytes)); } };
})();
</script>

.bg-photo .scrim{position:absolute; inset:0; background:linear-gradient(180deg, rgba(11,14,19,.72) 0%, rgba(11,14,19,.6) 42%, rgba(11,14,19,.82) 100%)}
.bg-photo .vig{position:absolute; inset:0; background:radial-gradient(120% 90% at 50% 30%, transparent 55%, rgba(8,10,14,.55) 100%)}
.app{display:grid; grid-template-columns:248px 1fr; min-height:100vh}

/* ---------- Sidebar ---------- */
.side{
  background:var(--chrome); color:#C6CBD2; display:flex; flex-direction:column;
  position:sticky; top:0; height:100vh; border-right:1px solid #000;
}
.brand{padding:22px 20px 18px; display:flex; gap:11px; align-items:center; border-bottom:1px solid var(--chrome-3)}
.brand svg{flex:none}
.brand .bt{font-family:var(--display); font-weight:700; font-size:15px; color:#fff; letter-spacing:.04em; line-height:1.15}
.brand .bs{font-size:10.5px; color:var(--ink-faint); letter-spacing:.14em; text-transform:uppercase}
.nav{padding:14px 12px; display:flex; flex-direction:column; gap:3px}
.nav .lbl{font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:#6B727C; padding:10px 10px 6px}
.nav button{
  all:unset; cursor:pointer; display:flex; align-items:center; gap:11px; padding:10px 11px;
  border-radius:var(--r-sm); color:#C6CBD2; font-size:13.5px; font-weight:500; transition:.15s;
}
.nav button:hover{background:var(--chrome-2); color:#fff}
.nav button.on{background:var(--chrome-3); color:#fff}
.nav button.on .ico{color:var(--accent)}
.nav .ico{width:18px; display:flex; justify-content:center; color:#7A828D}
.nav button.on .ico{color:var(--accent)}
.spacer{flex:1}
.rolebox{padding:14px 16px; border-top:1px solid var(--chrome-3)}
.rolebox .h{font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:#6B727C; margin-bottom:9px}
.rolebox .seg{display:flex; background:var(--chrome-2); border-radius:var(--r-sm); padding:3px; gap:3px}
.rolebox .seg button{
  all:unset; cursor:pointer; flex:1; text-align:center; padding:7px 4px; border-radius:6px;
  font-size:11.5px; font-weight:600; color:#9AA1AB; transition:.15s;
}
.rolebox .seg button.on{background:var(--accent); color:#1A140C}
.tolbox{padding:12px 16px 18px; border-top:1px solid var(--chrome-3)}
.tolbox .row{display:flex; justify-content:space-between; align-items:center; gap:8px}
.tolbox .h{font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:#6B727C}
.tolbox .v{font-family:var(--mono); color:var(--accent); font-weight:700; font-size:13px}
.tolbox input[type=range]{width:100%; margin-top:10px; accent-color:var(--accent)}
.tolbox .hint{font-size:10.5px; color:#6B727C; margin-top:6px; line-height:1.4}

/* ---------- Main ---------- */
.main{display:flex; flex-direction:column; min-width:0}
.topbar{
  display:flex; align-items:center; justify-content:space-between; gap:16px;
  padding:16px 28px; background:rgba(252,251,249,.9); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); border-bottom:1px solid var(--line);
  position:sticky; top:0; z-index:20;
}
.topbar .tt{font-family:var(--display); font-weight:600; font-size:18px; letter-spacing:-.01em}
.topbar .ts{font-size:12px; color:var(--ink-soft); margin-top:1px}
.topbar .right{display:flex; align-items:center; gap:14px}
.who{display:flex; align-items:center; gap:9px; padding:6px 12px 6px 6px; background:var(--surface-2); border:1px solid var(--line); border-radius:30px}
.who .av{width:30px; height:30px; border-radius:50%; background:var(--chrome); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:12px; font-family:var(--display)}
.who .nm{font-weight:600; font-size:12.5px}
.who .rl{font-size:11px; color:var(--ink-soft)}
.content{padding:26px 28px 60px; max-width:1180px; width:100%}

/* ---------- Generic ---------- */
.card{background:var(--surface); border:1px solid var(--line); border-radius:var(--r); box-shadow:var(--shadow)}
.eyebrow{font-size:11px; letter-spacing:.15em; text-transform:uppercase; color:var(--ink-faint); font-weight:600}
.btn{
  all:unset; cursor:pointer; display:inline-flex; align-items:center; gap:8px; justify-content:center;
  padding:11px 18px; border-radius:var(--r-sm); font-weight:600; font-size:13.5px; transition:.15s;
  background:var(--accent); color:#1A140C; box-shadow:0 1px 0 rgba(0,0,0,.04);
}
.btn:hover{background:var(--accent-press); color:#fff}
.btn:disabled,.btn[disabled]{opacity:.45; cursor:not-allowed; background:var(--ink-faint); color:#fff}
.btn.ghost{background:transparent; color:var(--ink); border:1px solid var(--line)}
.btn.ghost:hover{background:var(--surface-2); color:var(--ink)}
.btn.ok{background:var(--ok); color:#fff}
.btn.ok:hover{background:#268257}
.btn.sm{padding:8px 13px; font-size:12.5px}
.btn.full{width:100%}
.tag{display:inline-flex; align-items:center; gap:6px; padding:4px 10px; border-radius:30px; font-size:11.5px; font-weight:600; line-height:1}
.tag .dot{width:7px; height:7px; border-radius:50%}
.st-pendiente{background:var(--surface-2); color:var(--ink-soft)} .st-pendiente .dot{background:var(--ink-faint)}
.st-en_carga{background:var(--warn-soft); color:#8A6610} .st-en_carga .dot{background:var(--warn)}
.st-en_validacion{background:#E5EEF8; color:#2E5C94} .st-en_validacion .dot{background:#3E7AC0}
.st-autorizado{background:var(--ok-soft); color:#1E7048} .st-autorizado .dot{background:var(--ok)}
.st-salido{background:#EAE7F4; color:#5046A0} .st-salido .dot{background:#6A5DC4}
.st-bloqueado{background:var(--bad-soft); color:#A8302B} .st-bloqueado .dot{background:var(--bad)}
.ajuste-chip{background:var(--warn-soft); color:#8A6610; border:1px solid #EAD9A8; font-weight:700}
.mono{font-family:var(--mono)}
.muted{color:var(--ink-soft)}

/* ---------- Dashboard ---------- */
.kpis{display:grid; grid-template-columns:repeat(5,1fr); gap:14px; margin-bottom:22px}
.kpi{padding:16px 16px 15px; position:relative; overflow:hidden}
.kpi .k-ico{position:absolute; right:14px; top:14px; opacity:.9}
.kpi .k-lbl{font-size:11.5px; color:var(--ink-soft); font-weight:600; letter-spacing:.01em}
.kpi .k-val{font-family:var(--display); font-weight:700; font-size:30px; letter-spacing:-.02em; margin-top:8px; line-height:1}
.kpi .k-sub{font-size:11.5px; color:var(--ink-faint); margin-top:6px}
.kpi .k-val .u{font-size:15px; font-weight:600; color:var(--ink-soft); margin-left:3px}
.kpi.accent{border-top:3px solid var(--accent)}
.kpi.ok{border-top:3px solid var(--ok)}
.kpi.bad{border-top:3px solid var(--bad)}
.kpi.blue{border-top:3px solid #3E7AC0}
.kpi.amber{border-top:3px solid var(--warn)}

.grid2{display:grid; grid-template-columns:1.55fr 1fr; gap:18px; align-items:start}
.panel-h{display:flex; align-items:center; justify-content:space-between; padding:16px 18px; border-bottom:1px solid var(--line-soft)}
.panel-h h3{font-family:var(--display); font-weight:600; font-size:15px}

table{width:100%; border-collapse:collapse}
thead th{text-align:left; font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-faint); font-weight:600; padding:10px 18px; border-bottom:1px solid var(--line-soft)}
tbody td{padding:13px 18px; border-bottom:1px solid var(--line-soft); font-size:13px}
tbody tr{cursor:pointer; transition:.12s}
tbody tr:hover{background:var(--surface-2)}
tbody tr:last-child td{border-bottom:none}
.cellcode{font-family:var(--mono); font-weight:600; font-size:12.5px}
.cellsub{font-size:11.5px; color:var(--ink-soft)}

.dist{padding:18px}
.dist .row{display:flex; align-items:center; gap:12px; margin-bottom:13px}
.dist .row:last-child{margin-bottom:0}
.dist .rl{width:96px; font-size:12px; color:var(--ink-soft); flex:none}
.dist .bar{flex:1; height:9px; background:var(--surface-2); border-radius:6px; overflow:hidden}
.dist .bar i{display:block; height:100%; border-radius:6px}
.dist .rn{width:24px; text-align:right; font-family:var(--mono); font-weight:600; font-size:12.5px; flex:none}

/* ---------- Detalle ---------- */
.dt-head{display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:20px; flex-wrap:wrap}
.dt-head .back{all:unset; cursor:pointer; color:var(--ink-soft); font-size:12.5px; font-weight:600; display:inline-flex; gap:6px; align-items:center; margin-bottom:10px}
.dt-head .back:hover{color:var(--ink)}
.dt-code{font-family:var(--mono); font-weight:700; font-size:22px; letter-spacing:.01em}
.dt-meta{display:flex; gap:18px; margin-top:8px; flex-wrap:wrap}
.dt-meta .m{font-size:12.5px} .dt-meta .m b{display:block; font-size:11px; color:var(--ink-faint); font-weight:600; text-transform:uppercase; letter-spacing:.06em; margin-bottom:2px}

.dt-grid{display:grid; grid-template-columns:1.4fr 1fr; gap:18px; align-items:start}

/* Weighbridge LED panel */
.balanza{background:linear-gradient(180deg,#161E18,#0C140F); border:1px solid #05100A; border-radius:var(--r); padding:20px; color:#cfe; box-shadow:var(--shadow); position:relative; overflow:hidden}
.balanza::before{content:""; position:absolute; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.12) 4px); pointer-events:none; opacity:.5}
.balanza .bh{display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; position:relative}
.balanza .bh .t{font-family:var(--display); font-weight:600; font-size:13px; letter-spacing:.05em; color:#9FE9C0; text-transform:uppercase}
.balanza .bh .live{font-size:10.5px; font-family:var(--mono); color:var(--led-dim); display:flex; align-items:center; gap:6px}
.balanza .bh .live i{width:7px; height:7px; border-radius:50%; background:var(--led); box-shadow:0 0 8px var(--led); animation:pulse 1.8s infinite}
@keyframes pulse{50%{opacity:.35}}
.led-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:12px; position:relative}
.led{background:var(--led-bg); border:1px solid #0a1f15; border-radius:9px; padding:12px 14px}
.led .ll{font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:#4f7a64; font-family:var(--mono); margin-bottom:6px}
.led .lv{font-family:var(--mono); font-weight:700; font-size:26px; color:var(--led); text-shadow:0 0 10px rgba(76,227,140,.35); line-height:1; letter-spacing:.02em}
.led .lv .u{font-size:12px; color:#3c6b52; margin-left:4px; text-shadow:none}
.led.full{grid-column:1/-1}
.led.bad .lv{color:var(--led-bad); text-shadow:0 0 10px rgba(255,107,107,.4)}
.led.empty .lv{color:#274635; text-shadow:none}

/* Poka Yoke lock */
.poka{margin-top:16px; position:relative; display:flex; align-items:center; gap:16px; padding:16px; border-radius:11px; border:1px solid; background:#0C140F}
.poka.locked{border-color:#5a221f; background:linear-gradient(90deg,#1c0f0e,#140d0c)}
.poka.open{border-color:#1f5238; background:linear-gradient(90deg,#0d1a12,#0c1410)}
.poka .lk{width:46px; height:46px; border-radius:11px; display:flex; align-items:center; justify-content:center; flex:none}
.poka.locked .lk{background:rgba(214,69,63,.14); color:var(--led-bad)}
.poka.open .lk{background:rgba(76,227,140,.14); color:var(--led)}
.poka.locked .lk{animation:shake .5s}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-4px)}40%{transform:translateX(4px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}
.poka .pt{font-family:var(--display); font-weight:600; font-size:13.5px; letter-spacing:.04em}
.poka.locked .pt{color:#ff8d88} .poka.open .pt{color:#7fe9ab}
.poka .ps{font-size:11.5px; color:#6f8a7c; margin-top:3px; font-family:var(--mono)}
.poka.locked .ps{color:#9c6f6c}

/* stepper */
.stepper{padding:6px 0}
.step{display:flex; gap:14px; padding:0 18px}
.step .rail{display:flex; flex-direction:column; align-items:center; flex:none}
.step .node{width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-weight:700; font-size:12px; border:2px solid var(--line); background:var(--surface); color:var(--ink-faint); z-index:1}
.step .line{width:2px; flex:1; background:var(--line); min-height:18px}
.step:last-child .line{display:none}
.step .body{padding-bottom:18px; padding-top:2px}
.step .sl{font-weight:600; font-size:13px}
.step .sd{font-size:11.5px; color:var(--ink-soft); margin-top:2px}
.step.done .node{background:var(--ok); border-color:var(--ok); color:#fff}
.step.done .line{background:var(--ok)}
.step.active .node{border-color:var(--accent); color:var(--accent); background:var(--accent-soft)}
.step.active .sl{color:var(--accent-press)}
.step.skip .sl{color:var(--ink-faint)} .step.skip .sd{color:var(--ink-faint)}
.step.block .node{background:var(--bad); border-color:var(--bad); color:#fff}

/* action card */
.act{padding:18px}
.act h3{font-family:var(--display); font-weight:600; font-size:15px; margin-bottom:4px}
.act .ah{font-size:12.5px; color:var(--ink-soft); margin-bottom:15px}
.field{margin-bottom:13px}
.field label{display:block; font-size:11.5px; font-weight:600; color:var(--ink-soft); margin-bottom:6px; letter-spacing:.01em}
.field input,.field select{
  width:100%; padding:11px 13px; border:1px solid var(--line); border-radius:var(--r-sm);
  font-family:var(--body); font-size:14px; background:var(--surface); color:var(--ink); transition:.15s;
}
.field input.mono{font-family:var(--mono); font-weight:600}
.field input:focus,.field select:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft)}
.field .ig{display:flex; gap:8px}
.field .ig input{flex:1}
.simrow{display:flex; gap:8px; margin:4px 0 14px; flex-wrap:wrap}
.gate{display:flex; gap:10px; align-items:flex-start; padding:12px 14px; background:var(--warn-soft); border:1px solid #EAD9A8; border-radius:var(--r-sm); font-size:12.5px; color:#7A5E12; line-height:1.45}
.checkrow{display:flex; align-items:center; gap:11px; padding:13px; border:1px solid var(--line); border-radius:var(--r-sm); margin-bottom:14px; cursor:pointer}
.checkrow input{width:18px; height:18px; accent-color:var(--ok)}
.checkrow .cl{font-weight:600; font-size:13px}
.checkrow .cs{font-size:11.5px; color:var(--ink-soft)}

/* QR / ticket */
.ticket{padding:18px; text-align:center}
.qrwrap{display:inline-flex; padding:14px; background:#fff; border:1px solid var(--line); border-radius:11px; margin:6px auto 12px}
.qrwrap img,.qrwrap canvas{display:block; border-radius:4px}
.ticket .tc{font-family:var(--mono); font-weight:700; font-size:15px; letter-spacing:.02em}
.ticket .tl{font-size:11px; color:var(--ink-faint); letter-spacing:.14em; text-transform:uppercase; margin-bottom:4px}
.qr-fallback{font-family:var(--mono); font-size:10px; color:var(--ink-soft); white-space:pre-wrap; text-align:left; background:var(--surface-2); padding:12px; border-radius:8px; line-height:1.5}

/* evidencias */
.evz{padding:18px}
.evz .grid{display:flex; gap:10px; flex-wrap:wrap; margin-top:12px}
.evz .ph{width:74px; height:74px; border-radius:9px; object-fit:cover; border:1px solid var(--line); position:relative}
.evz .phw{position:relative}
.evz .rm{position:absolute; top:-6px; right:-6px; width:20px; height:20px; border-radius:50%; background:var(--bad); color:#fff; border:2px solid var(--surface); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:11px}
.evz .empty{font-size:12px; color:var(--ink-faint); padding:14px; text-align:center; border:1.5px dashed var(--line); border-radius:9px; margin-top:12px}

/* historial */
.hist{padding:18px; max-height:340px; overflow:auto}
.hi{display:flex; gap:12px; padding-bottom:15px; position:relative}
.hi:last-child{padding-bottom:0}
.hi .hr{display:flex; flex-direction:column; align-items:center; flex:none}
.hi .hdot{width:10px; height:10px; border-radius:50%; background:var(--accent); margin-top:4px; flex:none}
.hi .hline{width:2px; flex:1; background:var(--line-soft); margin-top:3px}
.hi:last-child .hline{display:none}
.hi .ht{font-size:12.5px; font-weight:600}
.hi .hd{font-size:11.5px; color:var(--ink-soft); margin-top:1px}
.hi .hm{font-family:var(--mono); font-size:10.5px; color:var(--ink-faint); margin-top:3px}

.sec-title{display:flex; align-items:center; gap:10px; margin:0 0 6px}
.subcard-h{padding:15px 18px 0}
.subcard-h h3{font-family:var(--display); font-weight:600; font-size:14px}

/* form nuevo */
.formwrap{max-width:620px}
.form-grid{display:grid; grid-template-columns:1fr 1fr; gap:14px}
.form-grid .full{grid-column:1/-1}
.preview{margin-top:6px; padding:14px 16px; background:var(--surface-2); border:1px solid var(--line); border-radius:var(--r-sm); display:flex; justify-content:space-between; align-items:center}
.preview .pl{font-size:11.5px; color:var(--ink-soft)}
.preview .pv{font-family:var(--mono); font-weight:700; font-size:18px; color:var(--accent-press)}

/* toast */
.toast{position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px); z-index:100; opacity:0; pointer-events:none; transition:.25s;
  background:var(--chrome); color:#fff; padding:13px 20px; border-radius:11px; box-shadow:0 12px 32px -8px rgba(0,0,0,.4); font-size:13px; font-weight:500; display:flex; align-items:center; gap:10px}
.toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
.toast .ti{width:8px; height:8px; border-radius:50%; background:var(--ok)}
.toast.bad .ti{background:var(--bad)}

.empty-state{text-align:center; padding:60px 20px; color:var(--ink-faint)}
.flt{display:flex; gap:8px; padding:14px 18px; border-bottom:1px solid var(--line-soft); flex-wrap:wrap}
.flt button{all:unset; cursor:pointer; padding:6px 13px; border-radius:30px; font-size:12px; font-weight:600; color:var(--ink-soft); border:1px solid var(--line)}
.flt button.on{background:var(--ink); color:#fff; border-color:var(--ink)}

@media (max-width:1000px){
  .app{grid-template-columns:1fr}
  .side{position:fixed; left:0; top:0; width:248px; transform:translateX(-100%); transition:.25s; z-index:60}
  .side.open{transform:none}
  .menu-btn{display:inline-flex !important}
  .kpis{grid-template-columns:repeat(2,1fr)}
  .grid2,.dt-grid{grid-template-columns:1fr}
  .content{padding:20px 16px 50px}
  .topbar{padding:14px 16px}
}
.menu-btn{display:none; all:unset; cursor:pointer; padding:8px; border-radius:8px; color:var(--ink)}
.scrim{display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:55}
.scrim.show{display:block}
@media(prefers-reduced-motion:reduce){*{animation:none !important; transition:none !important}}

/* ============================================================
   MÓDULO ANALÍTICA DE DESPACHOS
   ============================================================ */
.an-actions{display:flex; align-items:flex-start; justify-content:space-between; gap:14px; flex-wrap:wrap}
.an-meta{font-size:12.5px; color:var(--ink-soft)}
.an-meta b{color:var(--ink)}
.filtros-an{padding:16px 18px}
.filtros-an .frow{display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end}
.filtros-an .fg{display:flex; flex-direction:column; gap:5px}
.filtros-an label{font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-soft); font-weight:600}
.filtros-an select,.filtros-an input{padding:9px 11px; border:1px solid var(--line); border-radius:var(--r-sm); font-family:var(--body); font-size:13px; background:var(--surface); color:var(--ink); min-width:150px}
.filtros-an select:focus,.filtros-an input:focus{outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft)}
.filtros-an .fg.narrow select,.filtros-an .fg.narrow input{min-width:120px}

.kpis-an{display:grid; grid-template-columns:repeat(auto-fit,minmax(158px,1fr)); gap:12px}
.kpi.gray{border-top:3px solid #9AA0A8}
.kpi.purple{border-top:3px solid #6A5DC4}
.kpis-an .kpi .k-val{font-size:26px}
.kpis-an .kpi{padding:14px 15px 13px}

.charts-an{display:grid; grid-template-columns:1fr 1fr; gap:16px}
.chart-card{padding:16px 18px}
.chart-card h4{font-family:var(--display); font-weight:600; font-size:14px; letter-spacing:-.01em}
.chart-card .csub{font-size:11.5px; color:var(--ink-soft); margin:2px 0 12px}
.chart-svg{width:100%; height:auto; display:block; overflow:visible}
.chart-legend{display:flex; gap:14px; flex-wrap:wrap; margin-top:12px; font-size:11.5px; color:var(--ink-soft)}
.chart-legend .li{display:flex; align-items:center; gap:6px}
.chart-legend .sw{width:11px; height:11px; border-radius:3px; flex:none}
.chart-empty{padding:30px 16px; text-align:center; color:var(--ink-faint); font-size:12.5px}
.chart-full{grid-column:1/-1}
.gtxt{font-family:var(--body); fill:var(--ink-soft); font-size:11px}
.gtxt.dark{fill:var(--ink); font-weight:600}
.gaxis{stroke:var(--line); stroke-width:1}
.ggrid{stroke:var(--line-soft); stroke-width:1}

.table-scroll{overflow-x:auto; -webkit-overflow-scrolling:touch}
.table-scroll table{min-width:840px}
th[data-asort]{cursor:pointer; user-select:none; white-space:nowrap}
th[data-asort]:hover{color:var(--ink)}
th .arr{opacity:.5; font-size:9px; margin-left:3px}

#chartTip{position:fixed; z-index:200; pointer-events:none; background:var(--chrome); color:#fff; padding:8px 11px; border-radius:8px; font-size:11.5px; line-height:1.45; box-shadow:0 10px 28px -8px rgba(0,0,0,.45); opacity:0; transition:opacity .12s; max-width:250px}
#chartTip b{color:#fff; font-family:var(--mono)}

.an-empty{padding:56px 24px; text-align:center}
.an-empty .ei{width:52px; height:52px; border-radius:50%; background:var(--surface-2); display:inline-flex; align-items:center; justify-content:center; margin-bottom:14px; color:var(--ink-faint)}
.an-empty h3{font-family:var(--display); font-weight:600; font-size:16px; margin-bottom:6px}
.an-empty p{font-size:13px; color:var(--ink-soft); max-width:420px; margin:0 auto}

@media (max-width:1000px){ .charts-an{grid-template-columns:1fr} }

/* ============ Reporte para impresión / PDF ============ */
#print-area{display:none}
.rep{color:#111; font-family:var(--body)}
.rep h1{font-family:var(--display); font-size:20px; margin:0}
.rep .rep-top{display:flex; justify-content:space-between; align-items:flex-start; border-bottom:2px solid #111; padding-bottom:10px; margin-bottom:14px}
.rep .rep-brand{display:flex; align-items:center; gap:10px}
.rep .rep-sub{font-size:11px; color:#444; margin-top:2px}
.rep .rep-info{font-size:10.5px; color:#333; text-align:right; line-height:1.6}
.rep .rep-info b{color:#111}
.rep h2{font-family:var(--display); font-size:13px; margin:16px 0 8px; padding-bottom:4px; border-bottom:1px solid #bbb}
.rep .rep-kpis{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:6px}
.rep .rk{border:1px solid #ccc; border-radius:6px; padding:8px 10px}
.rep .rk .l{font-size:9.5px; color:#555; text-transform:uppercase; letter-spacing:.04em}
.rep .rk .v{font-family:var(--display); font-weight:700; font-size:17px; margin-top:3px}
.rep table{width:100%; border-collapse:collapse; font-size:10px; margin-top:6px}
.rep th{background:#eee; text-align:left; padding:5px 6px; border:1px solid #bbb; font-size:9px; text-transform:uppercase; letter-spacing:.03em}
.rep td{padding:4px 6px; border:1px solid #ccc}
.rep .rep-charts{display:flex; gap:14px; margin:6px 0}
.rep .rep-charts .card{flex:1; border:1px solid #ccc; box-shadow:none}
.rep .rep-foot{margin-top:16px; border-top:1px solid #bbb; padding-top:8px; display:flex; justify-content:space-between; font-size:10px; color:#444}
.rep .rep-tag{display:inline-block; padding:2px 7px; border-radius:20px; font-size:9px; font-weight:700; border:1px solid #999}
.rep .rep-note{font-size:10.5px; color:#333; margin:4px 0}

/* ---- Ticket de despacho imprimible ---- */
.rep.ticket-print{max-width:380px; margin:0 auto; border:1.5px solid #111; border-radius:10px; padding:18px}
.tk-head{text-align:center; border-bottom:2px solid #111; padding-bottom:10px; margin-bottom:12px}
.tk-head .tk-brand{font-family:var(--display); font-weight:700; font-size:16px; letter-spacing:.04em}
.tk-head .tk-sub{font-size:10.5px; color:#444; margin-top:2px; text-transform:uppercase; letter-spacing:.08em}
.tk-code{text-align:center; font-family:var(--mono); font-weight:700; font-size:19px; margin:8px 0 12px}
.tk-qr{display:flex; justify-content:center; margin-bottom:12px}
.tk-status{text-align:center; margin-bottom:14px}
.tk-status .tag{border:1px solid #111}
.tk-grid{display:grid; grid-template-columns:1fr 1fr; gap:6px 14px; font-size:11px; margin-bottom:12px}
.tk-grid .tf{color:#555; font-size:9.5px; text-transform:uppercase; letter-spacing:.05em}
.tk-grid .tv{font-weight:600; font-size:12px}

.tk-warn{border:1.5px dashed #B5771A; background:#FBF1D6; border-radius:7px; padding:9px 11px; font-size:10px; color:#6b4e0e; line-height:1.5; margin-bottom:14px}
.tk-sign{display:flex; gap:14px; margin-top:18px}
.tk-sign .s{flex:1; text-align:center; font-size:9.5px; color:#444}

  .bg-photo,.side,.topbar,.toast,#chartTip,#content,.scrim,.menu-btn{display:none !important}
  html,body{background:#fff !important}

  .rep thead{display:table-header-group}
  .rep tfoot{display:table-footer-group}
}

<style id="print-page"></style>

<script>
/* ============ Datos base ============ */
const MATERIALES = {
  'Piedra chancada': 1.50,
  'Piedra media':    1.45,
  'Arena gruesa':    1.55
};
let TOL = 3; // % tolerancia
let ROLE = 'administrativo';
let VIEW = 'tablero';
let CURRENT = null;
let FILTER = 'todos';
let SEQ = 7;

const ROLE_LABEL = { administrativo:'Personal administrativo', despachador:'Despachador' };
const ROLE_SHORT = { administrativo:'AD', despachador:'DE' };

function nowMinus(m){ return new Date(Date.now() - m*60000); }
function code(n){ return 'DSP-2026-' + String(n).padStart(4,'0'); }
function pesoVendido(d){ return Math.round(d.cantidadM3 * MATERIALES[d.material] * 1000); }
function pesoReal(d){ return (d.tara!=null && d.pesoFinal!=null) ? d.pesoFinal - d.tara : null; }
function difKg(d){ const r=pesoReal(d); return r==null?null:r - pesoVendido(d); }
function difPct(d){ const k=difKg(d); return k==null?null:(k / pesoVendido(d))*100; }
function dentroTol(d){ const p=difPct(d); return p==null?false:Math.abs(p)<=TOL; }

function mkHist(etapa, detalle, rol, ts){ return {etapa, detalle, rol, ts: ts||new Date()}; }

let DISPATCHES = seed();
function seed(){
  const d = [];
  function base(n, cliente, material, m3, placa, estado, extra, mins){
    const o = { id:'d'+n, codigo:code(n), cliente, material, cantidadM3:m3, placa,
      tara:null, pesoFinal:null, cargaConfirmada:false, lavado:false, estado,
      requirioAjuste:false, ajustes:0,
      fotos:[], historial:[], createdAt:nowMinus(mins), salidaAt:null };
    Object.assign(o, extra||{});
    o.historial.push(mkHist('Registro digital', 'Pedido registrado: '+m3+' m³ de '+material, 'administrativo', o.createdAt));
    return o;
  }
  // 1 — SALIDO ok
  let a = base(1,'Constructora Andina del Norte S.A.C.','Piedra chancada',20,'B5A-872','salido',
    {tara:13200, pesoFinal:43180, cargaConfirmada:true, lavado:true, salidaAt:nowMinus(250)}, 310);
  a.historial.push(mkHist('Pesaje inicial','Tara registrada: 13,200 kg','despachador',nowMinus(300)));
  a.historial.push(mkHist('Pesaje final','Peso de salida: 43,180 kg · Validación OK','despachador',nowMinus(270)));
  a.historial.push(mkHist('Autorización','Salida autorizada digitalmente','administrativo',nowMinus(258)));
  a.historial.push(mkHist('Salida','Vehículo salió de planta','administrativo',nowMinus(250)));
  d.push(a);
  // 2 — SALIDO ok
  let b = base(2,'Edificaciones Cajamarca E.I.R.L.','Arena gruesa',15,'V8C-330','salido',
    {tara:11800, pesoFinal:35100, cargaConfirmada:true, lavado:true, salidaAt:nowMinus(190)}, 240);
  b.historial.push(mkHist('Pesaje inicial','Tara registrada: 11,800 kg','despachador',nowMinus(232)));
  b.historial.push(mkHist('Pesaje final','Peso de salida: 35,100 kg · Validación OK','despachador',nowMinus(205)));
  b.historial.push(mkHist('Autorización','Salida autorizada digitalmente','administrativo',nowMinus(196)));
  b.historial.push(mkHist('Salida','Vehículo salió de planta','administrativo',nowMinus(190)));
  d.push(b);
  // 3 — BLOQUEADO (diferencia)
  let c = base(3,'Minera Yanacocha S.R.L.','Piedra media',25,'T2K-419','bloqueado',
    {tara:14500, pesoFinal:47900, cargaConfirmada:true, requirioAjuste:true}, 120);
  c.historial.push(mkHist('Pesaje inicial','Tara registrada: 14,500 kg','despachador',nowMinus(108)));
  c.historial.push(mkHist('Pesaje final','Peso de salida: 47,900 kg','despachador',nowMinus(96)));
  c.historial.push(mkHist('Bloqueo Poka Yoke','Diferencia fuera de tolerancia — salida bloqueada','despachador',nowMinus(96)));
  d.push(c);
  // 4 — AUTORIZADO (requirió ajuste y fue corregido)
  let e = base(4,'Constructora San Martín S.A.','Piedra chancada',18,'B1M-205','autorizado',
    {tara:12600, pesoFinal:39550, cargaConfirmada:true, lavado:true, requirioAjuste:true, ajustes:1}, 75);
  e.historial.push(mkHist('Pesaje inicial','Tara registrada: 12,600 kg','despachador',nowMinus(64)));
  e.historial.push(mkHist('Pesaje final','Peso de salida: 37,140 kg · diferencia -8.7%','despachador',nowMinus(52)));
  e.historial.push(mkHist('Bloqueo Poka Yoke','Diferencia fuera de tolerancia — salida bloqueada','despachador',nowMinus(52)));
  e.historial.push(mkHist('Ajuste por diferencia','Carga corregida · nuevo peso 39,550 kg · Validación OK (-0.2%)','despachador',nowMinus(46)));
  e.historial.push(mkHist('Lavado','Lavado del vehículo confirmado','despachador',nowMinus(40)));
  e.historial.push(mkHist('Autorización','Salida autorizada digitalmente','administrativo',nowMinus(35)));
  d.push(e);
  // 5 — EN CARGA
  let f = base(5,'Agregados del Valle S.A.C.','Arena gruesa',12,'C9D-118','en_carga',
    {tara:10900, cargaConfirmada:false}, 40);
  f.historial.push(mkHist('Pesaje inicial','Tara registrada: 10,900 kg','despachador',nowMinus(34)));
  d.push(f);
  // 6 — PENDIENTE
  let g = base(6,'Constructora Andina del Norte S.A.C.','Piedra chancada',10,'B5A-872','pendiente',{}, 12);
  d.push(g);

  /* ---- Datos históricos de demostración distribuidos en 2026 ---- */
  const CLIENTES=[
    ['Constructora Andina del Norte S.A.C.','B5A-872'],
    ['Minera Yanacocha S.R.L.','T2K-419'],
    ['Edificaciones Cajamarca E.I.R.L.','V8C-330'],
    ['Constructora San Martín S.A.','B1M-205'],
    ['Agregados del Valle S.A.C.','C9D-118'],
    ['Consorcio Vial Cajamarca','D4F-560'],
    ['Municipalidad de Baños del Inca','EGT-241']
  ];
  const MATS=['Piedra chancada','Piedra media','Arena gruesa'];
  function makeHist(n, cliente, placa, material, m3, date, tipo){
    const dens=MATERIALES[material]; const vendido=Math.round(m3*dens*1000); const tara=10000+Math.round(m3*130);
    const o={ id:'d'+n, codigo:code(n), cliente, material, cantidadM3:m3, placa,
      tara, pesoFinal:null, cargaConfirmada:true, lavado:false, estado:'salido',
      requirioAjuste:false, ajustes:0, fotos:[], historial:[], createdAt:date, salidaAt:null };
    o.historial.push(mkHist('Registro digital','Pedido registrado: '+m3+' m³ de '+material,'administrativo',date));
    o.historial.push(mkHist('Pesaje inicial','Tara registrada: '+fmtNum(tara)+' kg','despachador',new Date(date.getTime()+8*60000)));
    const t2=new Date(date.getTime()+20*60000);
    if(tipo==='bloqueo'){ o.pesoFinal=tara+Math.round(vendido*0.90); o.estado='bloqueado'; o.requirioAjuste=true;
      o.historial.push(mkHist('Pesaje final','Peso de salida: '+fmtNum(o.pesoFinal)+' kg','despachador',t2));
      o.historial.push(mkHist('Bloqueo Poka Yoke','Diferencia fuera de tolerancia — salida bloqueada','despachador',t2));
      return o; }
    o.pesoFinal=tara+vendido+Math.round(vendido*0.004*((n%2)?1:-1));
    if(tipo==='ajuste'){ o.requirioAjuste=true; o.ajustes=1; const badF=tara+Math.round(vendido*0.91);
      o.historial.push(mkHist('Pesaje final','Peso de salida: '+fmtNum(badF)+' kg · diferencia -9.0%','despachador',t2));
      o.historial.push(mkHist('Bloqueo Poka Yoke','Diferencia fuera de tolerancia — salida bloqueada','despachador',t2));
      o.historial.push(mkHist('Ajuste por diferencia','Ajuste N°1 · carga corregida a '+fmtNum(o.pesoFinal)+' kg · Validación OK','despachador',new Date(date.getTime()+28*60000)));
    } else {
      o.historial.push(mkHist('Pesaje final','Peso de salida: '+fmtNum(o.pesoFinal)+' kg · Validación OK','despachador',t2));
    }
    o.lavado=true;
    o.historial.push(mkHist('Lavado','Lavado del vehículo confirmado','despachador',new Date(date.getTime()+33*60000)));
    o.historial.push(mkHist('Autorización','Salida autorizada digitalmente','administrativo',new Date(date.getTime()+36*60000)));
    if(tipo==='autorizado'){ o.estado='autorizado'; return o; }
    o.estado='salido'; const att=45+(n%40); o.salidaAt=new Date(date.getTime()+att*60000);
    o.historial.push(mkHist('Salida','Vehículo salió de planta','administrativo',o.salidaAt));
    return o;
  }
  let seq=6; const AHORA=new Date();
  for(let mo=0; mo<7; mo++){          // Enero hasta el mes actual de 2026
    for(let i=0;i<7;i++){
      const day=3+((i*4+mo*3)%25);
      const hour=8+((i*2+mo)%9);
      const date=new Date(2026, mo, day, hour, (i*11)%60);
      if(date>=AHORA) continue;        // no generar registros futuros; el día de hoy ya está cubierto
      const ci=(i+mo)%CLIENTES.length, mi=(i*2+mo)%MATS.length;
      const m3=8+((i*3+mo)%5)*4;
      const roll=(i+mo*3)%10; let tipo='ok';
      if(roll===7) tipo='bloqueo'; else if(roll===4||roll===8) tipo='ajuste'; else if(roll===5) tipo='autorizado';
      seq++; d.push(makeHist(seq, CLIENTES[ci][0], CLIENTES[ci][1], MATS[mi], m3, date, tipo));
    }
  }
  SEQ=seq;
  return d;
}

/* ============ Utilidades de formato ============ */
function fmtKg(n){ return n==null?'—':Math.round(n).toLocaleString('es-PE')+' kg'; }
function fmtNum(n){ return Math.round(n).toLocaleString('es-PE'); }
function fmtPct(p){ if(p==null) return '—'; const s=p>=0?'+':''; return s+p.toFixed(1)+'%'; }
function fmtHora(d){ return d.toLocaleTimeString('es-PE',{hour:'2-digit',minute:'2-digit'}); }
function fmtFechaHora(d){ return d.toLocaleDateString('es-PE',{day:'2-digit',month:'short'})+' · '+fmtHora(d); }
function esHoy(d){ const n=new Date(); return d.getDate()===n.getDate()&&d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear(); }
function estadoTag(estado){ return '<span class="tag st-'+estado+'"><span class="dot"></span>'+ESTADO_LABEL[estado]+'</span>'; }
const ESTADO_LABEL = { pendiente:'Pendiente', en_carga:'En carga', en_validacion:'En validación', autorizado:'Autorizado', salido:'Salido', bloqueado:'Bloqueado' };

/* ============ Render principal ============ */
const content = document.getElementById('content');
function render(){
  // Defensa de rol: la analítica es exclusiva del personal administrativo
  if(VIEW==='analitica' && ROLE!=='administrativo'){ VIEW='tablero'; }
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('on', b.dataset.view===VIEW && !CURRENT));
  const titles = {
    tablero:['Tablero de control','Resumen operativo del día'],
    despachos:['Despachos','Registro y trazabilidad de salidas'],
    nuevo:['Nuevo despacho','Registro digital del pedido'],
    analitica:['Analítica de despachos','Indicadores, tendencias y control histórico de la operación']
  };
  if(CURRENT){ document.getElementById('pageTitle').textContent='Detalle de despacho';
    document.getElementById('pageSub').textContent='Flujo y trazabilidad'; }
  else { const t=titles[VIEW]; document.getElementById('pageTitle').textContent=t[0]; document.getElementById('pageSub').textContent=t[1]; }

  if(CURRENT){ content.innerHTML = viewDetalle(CURRENT); afterDetalle(CURRENT); return; }
  if(VIEW==='tablero') content.innerHTML = viewTablero();
  else if(VIEW==='despachos') content.innerHTML = viewDespachos();
  else if(VIEW==='nuevo') content.innerHTML = viewNuevo();
  else if(VIEW==='analitica') content.innerHTML = viewAnalitica();
}

/* ---------- Tablero ---------- */
function viewTablero(){
  const hoy = DISPATCHES.filter(d=>esHoy(d.createdAt));
  const total = DISPATCHES.length;
  const formales = DISPATCHES.filter(d=>d.estado==='autorizado'||d.estado==='salido').length;
  const pctFormal = total? Math.round(formales/total*100):0;
  const bloq = DISPATCHES.filter(d=>d.estado==='bloqueado').length;
  const conAjuste = DISPATCHES.filter(d=>d.requirioAjuste).length;
  const salidos = DISPATCHES.filter(d=>d.estado==='salido'&&d.salidaAt);
  const tProm = salidos.length? Math.round(salidos.reduce((s,d)=>s+(d.salidaAt-d.createdAt)/60000,0)/salidos.length):0;

  const counts = {};
  Object.keys(ESTADO_LABEL).forEach(k=>counts[k]=DISPATCHES.filter(d=>d.estado===k).length);
  const maxc = Math.max(1,...Object.values(counts));
  const colorBar = {pendiente:'#9AA0A8',en_carga:'#D79A24',en_validacion:'#3E7AC0',autorizado:'#2E9E6B',salido:'#6A5DC4',bloqueado:'#D6453F'};

  const recientes = [...DISPATCHES].sort((a,b)=>b.createdAt-a.createdAt).slice(0,6);

  return `
  <div class="kpis">
    <div class="card kpi accent">
      <div class="k-ico">${ico('truck','#E8772E')}</div>
      <div class="k-lbl">Despachos del día</div>
      <div class="k-val">${hoy.length}</div>
      <div class="k-sub">Registrados hoy en planta</div>
    </div>
    <div class="card kpi ok">
      <div class="k-ico">${ico('check','#2E9E6B')}</div>
      <div class="k-lbl">Autorizados formalmente</div>
      <div class="k-val">${pctFormal}<span class="u">%</span></div>
      <div class="k-sub">${formales} de ${total} con autorización digital</div>
    </div>
    <div class="card kpi bad">
      <div class="k-ico">${ico('lock','#D6453F')}</div>
      <div class="k-lbl">Bloqueados por peso</div>
      <div class="k-val">${bloq}</div>
      <div class="k-sub">Detenidos por el candado Poka Yoke</div>
    </div>
    <div class="card kpi amber">
      <div class="k-ico">${ico('adjust','#D79A24')}</div>
      <div class="k-lbl">Despachos con ajuste</div>
      <div class="k-val">${conAjuste}</div>
      <div class="k-sub">Requirieron corrección de carga</div>
    </div>
    <div class="card kpi blue">
      <div class="k-ico">${ico('clock','#3E7AC0')}</div>
      <div class="k-lbl">Tiempo prom. de atención</div>
      <div class="k-val">${tProm}<span class="u">min</span></div>
      <div class="k-sub">Del registro a la salida</div>
    </div>
  </div>

  <div class="grid2">
    <div class="card">
      <div class="panel-h"><h3>Despachos recientes</h3>
        <button class="btn ghost sm" data-go="despachos">Ver todos →</button></div>
      <table>
        <thead><tr><th>Código</th><th>Cliente</th><th>Material</th><th>Validación</th><th>Estado</th></tr></thead>
        <tbody>
          ${recientes.map(d=>`
            <tr data-open="${d.id}">
              <td><div class="cellcode">${d.codigo}${d.requirioAjuste?' '+ajusteChip(d,true):''}</div><div class="cellsub">${fmtHora(d.createdAt)} · ${d.placa}</div></td>
              <td>${d.cliente}</td>
              <td>${d.material}<div class="cellsub">${d.cantidadM3} m³ · ${fmtNum(pesoVendido(d))} kg</div></td>
              <td>${valCell(d)}</td>
              <td>${estadoTag(d.estado)}</td>
            </tr>`).join('')}
        </tbody>
      </table>
    </div>

    <div class="card">
      <div class="panel-h"><h3>Estado de los despachos</h3></div>
      <div class="dist">
        ${Object.keys(ESTADO_LABEL).map(k=>`
          <div class="row">
            <div class="rl">${ESTADO_LABEL[k]}</div>
            <div class="bar"><i style="width:${counts[k]/maxc*100}%;background:${colorBar[k]}"></i></div>
            <div class="rn">${counts[k]}</div>
          </div>`).join('')}
      </div>
    </div>
  </div>`;
}
function valCell(d){
  if(d.tara==null||d.pesoFinal==null) return '<span class="muted" style="font-size:12px">Pendiente</span>';
  const ok=dentroTol(d);
  return `<span class="mono" style="font-weight:600;font-size:12.5px;color:${ok?'var(--ok)':'var(--bad)'}">${fmtPct(difPct(d))} ${ok?'✓':'✕'}</span>`;
}
function ajusteChip(d, compact){
  const n=d.ajustes||0;
  const txt = compact ? ('Ajuste'+(n>1?' ×'+n:'')) : ('Requirió ajuste'+(n>0?' · '+n+' registrado'+(n>1?'s':''):''));
  return '<span class="tag ajuste-chip">'+warnTri()+txt+'</span>';
}
function warnTri(){ return '<svg width="12" height="12" viewBox="0 0 24 24" style="vertical-align:-1px;margin-right:1px"><path d="M12 3L22 20H2L12 3Z" fill="none" stroke="#B5771A" stroke-width="2" stroke-linejoin="round"/><path d="M12 10v4M12 17h.01" stroke="#B5771A" stroke-width="2" stroke-linecap="round"/></svg>'; }

/* ---------- Despachos (lista) ---------- */
function viewDespachos(){
  const list = FILTER==='todos'? DISPATCHES
    : (FILTER==='con_ajuste'? DISPATCHES.filter(d=>d.requirioAjuste)
    : DISPATCHES.filter(d=>d.estado===FILTER));
  const sorted=[...list].sort((a,b)=>b.createdAt-a.createdAt);
  const filtros=['todos',...Object.keys(ESTADO_LABEL),'con_ajuste'];
  return `
  <div class="card">
    <div class="flt">
      ${filtros.map(f=>`<button data-filter="${f}" class="${FILTER===f?'on':''}">${f==='todos'?'Todos':(f==='con_ajuste'?'Con ajuste':ESTADO_LABEL[f])}</button>`).join('')}
    </div>
    <table>
      <thead><tr><th>Código</th><th>Cliente</th><th>Placa</th><th>Material</th><th>Peso vendido</th><th>Validación</th><th>Ajuste</th><th>Estado</th></tr></thead>
      <tbody>
        ${sorted.length? sorted.map(d=>`
          <tr data-open="${d.id}">

  if(!validado){ lockTitle='SALIDA BLOQUEADA'; lockSub='Falta completar el pesaje para validar.'; }
  else if(ok){ lockTitle='SALIDA HABILITADA'; lockSub='Peso dentro de tolerancia ±'+TOL+'% · candado liberado'; }
  else { lockTitle='SALIDA BLOQUEADA'; lockSub='Diferencia '+fmtPct(dp)+' fuera de ±'+TOL+'% · requiere ajuste'; }
  return `
  <div class="balanza">
    <div class="bh">

      <div class="live"><i></i>BÁSCULA EN LÍNEA</div>
    </div>

      <div class="led ${d.pesoFinal==null?'empty':''}"><div class="ll">Peso salida · cargado</div><div class="lv">${d.pesoFinal!=null?fmtNum(d.pesoFinal):'-----'}<span class="u">kg</span></div></div>
      <div class="led ${pr==null?'empty':(ok?'':'bad')}"><div class="ll">Material cargado / diferencia</div><div class="lv">${pr!=null?fmtNum(pr):'-----'}<span class="u">kg ${dp!=null?'· '+fmtPct(dp):''}</span></div></div>

/* Panel de acción según estado y rol */
function panelAccion(d){
  const isAdmin = ROLE==='administrativo', isDesp = ROLE==='despachador';
  const gateDesp = `<div class="gate">${ico('info','#7A5E12')}<div>Esta acción la ejecuta el <b>despachador</b>. Cambia de rol para continuar.</div></div>`;
  const gateAdmin = `<div class="gate">${ico('info','#7A5E12')}<div>La autorización de salida la realiza el <b>personal administrativo</b>. Cambia de rol para continuar.</div></div>`;

  // 1) Pendiente → pesaje inicial (tara)
  if(d.estado==='pendiente'){
    return `<h3>Pesaje inicial — Tara del vehículo</h3><p class="ah">Registra el peso del vehículo vacío al ingresar a la balanza.</p>
      ${isDesp? `
      <div class="field"><label>Peso de ingreso · tara (kg)</label>
        <div class="ig"><input class="mono" id="in_tara" type="number" placeholder="0" min="0"></div></div>
      <div class="simrow"><button class="btn ghost sm" data-sim="tara" data-id="${d.id}">${ico('scale','#1A1E23')} Simular balanza</button></div>
      <button class="btn full" data-act="settara" data-id="${d.id}">Registrar tara y abrir carga</button>` : gateDesp}`;
  }
  // 2) En carga, sin confirmar carga
  if(d.estado==='en_carga' && !d.cargaConfirmada){
    return `<h3>Carga del material</h3><p class="ah">Tara registrada: <b class="mono">${fmtKg(d.tara)}</b>. Confirma cuando el vehículo termine de cargar.</p>
      ${isDesp? `<button class="btn full" data-act="carga" data-id="${d.id}">${ico('check','#1A140C')} Confirmar carga completada</button>` : gateDesp}`;
  }
  // 3) En carga, carga confirmada → pesaje final
  if(d.estado==='en_carga' && d.cargaConfirmada){
    return `<h3>Pesaje final y validación</h3><p class="ah">Registra el peso del vehículo cargado. El sistema valida automáticamente contra el peso vendido.</p>
      ${isDesp? `
      <div class="field"><label>Peso de salida · cargado (kg)</label>
        <div class="ig"><input class="mono" id="in_final" type="number" placeholder="0" min="0"></div></div>
      <div class="simrow">
        <button class="btn ghost sm" data-sim="ok" data-id="${d.id}">${ico('scale','#1A1E23')} Simular peso correcto</button>
        <button class="btn ghost sm" data-sim="bad" data-id="${d.id}">${ico('scale','#1A1E23')} Simular con diferencia</button>
      </div>
      <button class="btn full" data-act="setfinal" data-id="${d.id}">Registrar pesaje y validar</button>` : gateDesp}`;
  }
  // 4) Bloqueado → ajuste
  if(d.estado==='bloqueado'){
    return `<h3 style="color:var(--bad)">Ajuste por diferencia de peso</h3>
      <p class="ah">El peso real (${fmtKg(pesoReal(d))}) difiere <b style="color:var(--bad)">${fmtPct(difPct(d))}</b> del vendido, fuera de la tolerancia de ±${TOL}%. Corrige la carga y vuelve a pesar.</p>
      ${isDesp? `
      <div class="field"><label>Nuevo peso de salida · cargado (kg)</label>
        <div class="ig"><input class="mono" id="in_final" type="number" placeholder="0" min="0" value="${d.pesoFinal||''}"></div></div>
      <div class="simrow"><button class="btn ghost sm" data-sim="ok" data-id="${d.id}">${ico('scale','#1A1E23')} Simular peso corregido</button></div>
      <button class="btn full" data-act="reweigh" data-id="${d.id}">Registrar ajuste y re-validar</button>` : gateDesp}`;
  }
  // 5) En validación (ok) → lavado + autorización
  if(d.estado==='en_validacion'){
    let h = `<h3 style="color:var(--ok)">Validación aprobada</h3><p class="ah">Peso real ${fmtKg(pesoReal(d))} · diferencia ${fmtPct(difPct(d))} dentro de ±${TOL}%.</p>`;
    h += `<label class="checkrow"><input type="checkbox" ${d.lavado?'checked':''} data-act="lavado" data-id="${d.id}"><div><div class="cl">Lavado del vehículo</div><div class="cs">Marca cuando el vehículo haya sido lavado.</div></div></label>`;
    if(isAdmin){
      const ready = d.lavado;
      h += `<button class="btn ok full" data-act="autorizar" data-id="${d.id}" ${ready?'':'disabled'}>${ico('unlock','#fff')} Autorizar salida (Poka Yoke)</button>`;
      if(!ready) h += `<p class="muted" style="font-size:11.5px;margin-top:8px;text-align:center">Confirma el lavado para habilitar la autorización.</p>`;
    } else {
      h += gateAdmin;
    }
    return h;
  }
  // 6) Autorizado → registrar salida
  if(d.estado==='autorizado'){
    return `<h3 style="color:var(--ok)">Salida autorizada</h3><p class="ah">El candado Poka Yoke está liberado. Registra la salida del vehículo de planta.</p>
      <button class="btn full" data-act="salida" data-id="${d.id}">${ico('truck','#1A140C')} Registrar salida del vehículo</button>`;
  }
  // 7) Salido → cerrado
  if(d.estado==='salido'){
    const dur = d.salidaAt? Math.round((d.salidaAt-d.createdAt)/60000):null;
    return `<h3 style="color:#5046A0">Despacho completado</h3>
      <p class="ah">Salida registrada ${d.salidaAt?fmtFechaHora(d.salidaAt):''}. Trazabilidad cerrada.</p>
      <div class="preview"><div class="pl">Tiempo total de atención</div><div class="pv" style="color:#5046A0">${dur!=null?dur+' min':'—'}</div></div>`;
  }
  return '';
}

function stepper(d){
  const ok = d.tara!=null && d.pesoFinal!=null && dentroTol(d);
  const blocked = d.estado==='bloqueado';
  const st = {
    registro:   'done',
    pesaje_ini: d.tara!=null?'done':(d.estado==='pendiente'?'active':'pending'),
    carga:      d.cargaConfirmada?'done':(d.estado==='en_carga'&&d.tara!=null?'active':'pending'),
    ajuste:     blocked?'block':(d.requirioAjuste?'done':(d.pesoFinal!=null?'skip':'pending')),
    pesaje_fin: (d.pesoFinal!=null && (ok||['en_validacion','autorizado','salido'].includes(d.estado)))?'done':((d.estado==='en_carga'&&d.cargaConfirmada)||blocked?'active':'pending'),
    lavado:     d.lavado?'done':(d.estado==='en_validacion'?'active':'pending'),
    autoriz:    ['autorizado','salido'].includes(d.estado)?'done':(d.estado==='en_validacion'&&d.lavado?'active':'pending'),
    salida:     d.estado==='salido'?'done':(d.estado==='autorizado'?'active':'pending')
  };
  const rows = [
    [1,'registro','Registro digital del pedido','Cliente, material, m³ y placa'],
    [2,'pesaje_ini','Pesaje inicial','Tara del vehículo'],
    [3,'carga','Carga del material','Carga de agregados'],
    [4,'ajuste','Ajuste por diferencia','Solo si el peso no cuadra'],
    [5,'pesaje_fin','Pesaje final y validación','Compara peso vendido vs. cargado'],
    [6,'lavado','Lavado del vehículo','Antes de la salida'],
    [7,'autoriz','Autorización de salida','Candado Poka Yoke'],
    [8,'salida','Registro de salida','Vehículo sale de planta']
  ];
  return rows.map(([n,key,lbl,sub])=>{
    const s = st[key];
    const cls = s==='done'?'done':s==='active'?'active':s==='block'?'block':s==='skip'?'skip':'';
    let node = n;
    if(s==='done') node='✓'; else if(s==='block') node='!';
    let subtxt = sub;
    if(key==='ajuste'){
      if(s==='done') subtxt='Aplicado · '+(d.ajustes||1)+' ajuste'+((d.ajustes||1)>1?'s':'')+' registrado'+((d.ajustes||1)>1?'s':'');
      else if(s==='block') subtxt='Peso fuera de tolerancia — corregir carga';
      else if(s==='skip') subtxt='No requerido — peso dentro de tolerancia';
    }
    return `<div class="step ${cls}"><div class="rail"><div class="node">${node}</div><div class="line"></div></div>
      <div class="body"><div class="sl">${lbl}</div><div class="sd">${subtxt}</div></div></div>`;
  }).join('');
}

function historial(d){
  const items=[...d.historial].sort((a,b)=>b.ts-a.ts);
  return items.map(h=>`
    <div class="hi"><div class="hr"><div class="hdot" style="background:${h.rol==='administrativo'?'#E8772E':'#3E7AC0'}"></div><div class="hline"></div></div>
      <div><div class="ht">${h.etapa}</div><div class="hd">${h.detalle}</div>
      <div class="hm">${ROLE_LABEL[h.rol]} · ${fmtFechaHora(h.ts)}</div></div></div>`).join('');
}

/* QR */
function qrPayload(d){
  return d.codigo+' | '+d.cliente+' | '+d.material+' '+d.cantidadM3+'m3 | '
    +d.placa+' | '+ESTADO_LABEL[d.estado].toUpperCase()
    +(d.pesoFinal!=null ? ' | '+fmtNum(pesoReal(d))+'kg '+fmtPct(difPct(d)) : '');
}
function qrSVGString(d, px){
  px=px||4.4;
  const payload=qrPayload(d);
  try{
    const qr=QRGen.generate(payload,'M');
    const n=qr.size, quiet=4, dim=n+quiet*2;
    let rects='';
    for(let r=0;r<n;r++) for(let c=0;c<n;c++)
      if(qr.modules[r][c]) rects+='<rect x="'+(c+quiet)+'" y="'+(r+quiet)+'" width="1" height="1"/>';
    return '<svg width="'+Math.round(dim*px)+'" height="'+Math.round(dim*px)+'" '
      +'viewBox="0 0 '+dim+' '+dim+'" shape-rendering="crispEdges" xmlns="http://www.w3.org/2000/svg" '
      +'role="img" aria-label="Código QR del despacho '+d.codigo+'">'
      +'<rect width="'+dim+'" height="'+dim+'" fill="#ffffff"/>'
      +'<g fill="#15191F">'+rects+'</g></svg>';
  }catch(e){
    return '<div class="qr-fallback">'+payload.split(' | ').join('\n')+'</div>';
  }
}
function renderQR(d){
  const box=document.getElementById('qrbox'); if(!box) return;
  box.innerHTML = qrSVGString(d, 4.4);
}

/* ============ Acciones ============ */
function getById(id){ return DISPATCHES.find(d=>d.id===id); }
function log(d,etapa,detalle){ d.historial.push(mkHist(etapa,detalle,ROLE)); }

function doAction(act, id){
  const d=getById(id); if(!d) return;
  if(act==='settara'){
    const v=parseFloat(document.getElementById('in_tara').value);
    if(!(v>0)){ toast('Ingresa una tara válida','bad'); return; }
    d.tara=Math.round(v); d.estado='en_carga'; d.cargaConfirmada=false;
    log(d,'Pesaje inicial','Tara registrada: '+fmtKg(d.tara));
    toast('Tara registrada · vehículo en carga');
  }
  else if(act==='carga'){
    d.cargaConfirmada=true; log(d,'Carga del material','Carga de '+d.material+' completada');
    toast('Carga confirmada · listo para pesaje final');
  }
  else if(act==='setfinal' || act==='reweigh'){
    const v=parseFloat(document.getElementById('in_final').value);
    if(!(v>0)){ toast('Ingresa un peso de salida válido','bad'); return; }
    if(v<=d.tara){ toast('El peso cargado debe superar la tara','bad'); return; }
    d.pesoFinal=Math.round(v);
    const ok=dentroTol(d);
    if(act==='reweigh'){ d.ajustes=(d.ajustes||0)+1; d.requirioAjuste=true; }
    if(ok){ d.estado='en_validacion';
      if(act==='reweigh')
        log(d,'Ajuste por diferencia','Ajuste N°'+d.ajustes+' · carga corregida a '+fmtKg(d.pesoFinal)+' · Validación OK ('+fmtPct(difPct(d))+')');
      else
        log(d,'Pesaje final','Peso de salida: '+fmtKg(d.pesoFinal)+' · Validación OK ('+fmtPct(difPct(d))+')');
      toast(act==='reweigh'?('Ajuste N°'+d.ajustes+' aplicado · validación aprobada'):('Validación aprobada · diferencia '+fmtPct(difPct(d))));
    } else { d.estado='bloqueado'; d.requirioAjuste=true;
      log(d,'Bloqueo Poka Yoke','Peso '+fmtKg(d.pesoFinal)+' · diferencia '+fmtPct(difPct(d))+' fuera de ±'+TOL+'% — salida bloqueada');
      toast('Salida bloqueada · diferencia '+fmtPct(difPct(d)),'bad');
    }
  }
  else if(act==='lavado'){
    d.lavado=!d.lavado;
    log(d,'Lavado del vehículo', d.lavado?'Lavado confirmado':'Lavado desmarcado');
  }
  else if(act==='autorizar'){
    if(ROLE!=='administrativo'){ toast('Solo el personal administrativo autoriza','bad'); return; }
    if(!d.lavado){ toast('Confirma el lavado antes de autorizar','bad'); return; }
    if(!dentroTol(d)){ toast('El candado Poka Yoke impide autorizar','bad'); return; }
    d.estado='autorizado'; log(d,'Autorización digital','Salida autorizada por el personal administrativo');
    toast('Salida autorizada · candado liberado');
  }
  else if(act==='salida'){
    d.estado='salido'; d.salidaAt=new Date();
    log(d,'Registro de salida','Vehículo salió de planta');
    toast('Salida registrada · despacho completado');
  }
  render();
  if(CURRENT) renderQR(d);
}

function simular(tipo, id){
  const d=getById(id); if(!d) return;
  if(tipo==='tara'){
    const el=document.getElementById('in_tara'); if(el) el.value = 9000 + Math.round(Math.random()*5500);
  } else if(tipo==='ok'){
    const el=document.getElementById('in_final');
    const noise = Math.round((Math.random()*2-1)*pesoVendido(d)*0.01); // ±1%
    if(el) el.value = (d.tara||12000) + pesoVendido(d) + noise;
  } else if(tipo==='bad'){
    const el=document.getElementById('in_final');
    if(el) el.value = (d.tara||12000) + Math.round(pesoVendido(d)*0.91); // -9%
  }
}

function nuevoDespacho(){

  const cliente=document.getElementById('f_cliente').value.trim();
  const material=document.getElementById('f_material').value;

  if(!placa){ toast('Ingresa la placa del vehículo','bad'); return; }
  SEQ++;
  const d={ id:'d'+SEQ, codigo:code(SEQ), cliente, material, cantidadM3:m3, placa,

    fotos:[], historial:[], createdAt:new Date(), salidaAt:null };
